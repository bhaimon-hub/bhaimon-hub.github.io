<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB LUCKY SPIN</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<style>
body { text-align:center; font-family:Arial; background:#f5f5f5; }

/* MENU */
#menuBtn { position:fixed; top:15px; right:20px; font-size:28px; cursor:pointer; }
#menu {
  position:fixed; top:50px; right:20px;
  background:white; border-radius:10px;
  display:none; box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
#menu div { padding:12px 20px; cursor:pointer; }
#menu div:hover { background:#eee; }

/* WHEEL */
#wheelBox { position:relative; width:350px; margin:40px auto; }
.pointer {
  position: absolute;
  left: 50%;
  top: -10px;
  transform: translateX(-50%);
  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-top: 35px solid black;
  z-index: 1000; /* 🔥 THIS FIXES IT */
}
canvas { width:100%; border-radius:50%; border:10px solid white; }

button { padding:12px 40px; margin-top:20px; cursor:pointer; }

#result { margin-top:15px; font-weight:bold; }
#spinCount { margin-top:8px; font-weight:bold; }

/* POPUP */
.popup {
  position:fixed; bottom:-100px; left:50%;
  transform:translateX(-50%);
  background:#111; color:white;
  padding:10px 20px; border-radius:20px;
  transition:0.4s;
}
.popup.show { bottom:30px; }
</style>
</head>

<body>

<div id="menuBtn">⋮</div>
<div id="menu">
  <div onclick="dailySpin()">🎁 Daily Spin</div>
  <div onclick="shareSpin()">📤 Share for Spins</div>
  <div onclick="watchAd()">📺 Watch Ads</div>
</div>

<div id="popup" class="popup"><span id="popupText"></span></div>

<h2>🎯 MLBB LUCKY SPIN</h2>

<div id="wheelBox">
  <div class="pointer"></div>
  <canvas id="wheel" width="500" height="500"></canvas>
</div>

<button onclick="spin()">Spin</button>
<div id="spinCount"></div>
<div id="result"></div>

<div id="leaderboard">
  <h3>🏆 Winners</h3>
  <div style="text-align:center;">No winners yet</div>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const sections = ["Try Again","2💎","1💎","Try Again","CODE","1 Spin","Try Again","10💎"];
const colors = ["#f4d3d3","#d1e7dd","#cfe2f3","#fff3cd","#e2e3e5","#f8d7da","#e0fbfc","#ffefdb"];

const total = sections.length;
const arc = 2*Math.PI/total;

// DRAW
for(let i=0;i<total;i++){
  ctx.beginPath();
  ctx.fillStyle=colors[i];
  ctx.moveTo(250,250);
  ctx.arc(250,250,250,i*arc,(i+1)*arc);
  ctx.fill();

  ctx.save();
  ctx.translate(250,250);
  ctx.rotate(i*arc+arc/2);
  ctx.fillStyle="#000";
  ctx.textAlign="right";
  ctx.font="bold 16px Arial";
  ctx.fillText(sections[i],220,10);
  ctx.restore();
}

// POPUP
function showPopup(msg){
  const p=document.getElementById("popup");
  document.getElementById("popupText").innerText=msg;
  p.classList.add("show");
  setTimeout(()=>p.classList.remove("show"),2500);
}

// 🔒 FIXED STORAGE
let spins, lastDaily;

if(localStorage.getItem("initialized")){
  spins=parseInt(localStorage.getItem("spins"));
  lastDaily=parseInt(localStorage.getItem("lastDaily"))||0;
}else{
  spins=2;
  lastDaily=0;
  localStorage.setItem("initialized","true");
  localStorage.setItem("spins",spins);
  localStorage.setItem("lastDaily",lastDaily);
}

function saveSpins(){
  localStorage.setItem("spins",spins);
  updateSpinUI();
}

function updateSpinUI(){
  document.getElementById("spinCount").innerText="Spins: "+spins;
}

updateSpinUI();

// MENU
document.getElementById("menuBtn").onclick=()=>{
  const m=document.getElementById("menu");
  m.style.display=m.style.display==="block"?"none":"block";
};

// SPIN (UNCHANGED)
function spin(){

  if(spins<=0){
    showPopup("No spins left!");
    return;
  }

  spins--;
  saveSpins();

  const rand=Math.random()*100;
  let winIdx;

  if(rand<0.05) winIdx=7;
  else if(rand<0.10) winIdx=2;
  else if(rand<0.15) winIdx=4;
  else{
    const common=[0,3,6];
    winIdx=common[Math.floor(Math.random()*common.length)];
  }

  const sliceDeg=360/total;
  const target=(winIdx*sliceDeg)+sliceDeg/2;
  const final=360-target-90;
  const rotate=360*6+final;

  canvas.style.transition="none";
  canvas.style.transform="rotate(0deg)";
  canvas.offsetHeight;

  canvas.style.transition="transform 5s cubic-bezier(0.25,1,0.5,1)";
  canvas.style.transform=`rotate(${rotate}deg)`;

  setTimeout(()=>{
    document.getElementById("result").innerText="You got: "+sections[winIdx];
    if([2,4,7].includes(winIdx)){
      confetti({particleCount:200,spread:100});
    }
  },5000);
}

// DAILY
function dailySpin(){
  const now=Date.now();
  if(now-lastDaily>86400000){
    spins++;
    lastDaily=now;
    localStorage.setItem("lastDaily",lastDaily);
    saveSpins();
    showPopup("+1 spin claimed!");
  }else{
    showPopup("Already claimed today!");
  }
}

// SHARE
function shareSpin(){
  if(!navigator.share){
    showPopup("Sharing not supported!");
    return;
  }

  navigator.share({
    title:"Broxy Spin",
    text:"Try your luck!",
    url:location.href
  }).then(()=>{
    spins++;
    saveSpins();
    showPopup("+1 spin after sharing!");
  }).catch(()=>{
    showPopup("Share cancelled");
  });
}

// ADS
function watchAd(){
  window.open("https://www.profitableratecpm.com/abc123","_blank");

  setTimeout(()=>{
    spins++;
    saveSpins();
    showPopup("+1 spin after ad!");
  },5000);
}
</script>

</body>
</html>
