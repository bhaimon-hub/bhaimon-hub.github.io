<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLBB Lucky Spin | Broxy Hub</title>
  
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2649315592388720" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --deep-forest: #1a3c34;
      --cream: #fbfbf8;
      --gold-royal: #ffd700;
      --gold-dark: #b8860b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--cream);
      background-image: linear-gradient(rgba(251, 251, 248, 0.92), rgba(251, 251, 248, 0.92)), url('1000117952.jpg'); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #333;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      padding: 0 20px 100px;
    }

    /* ULTIMATE PROFESSIONAL NOTICE */
    #result-notice {
      position: fixed;
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1001;
      padding: 25px 70px;
      border-radius: 20px;
      font-weight: 900;
      text-transform: uppercase;
      transition: top 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 4px solid var(--gold-royal);
      background: #0b0e14;
      color: white;
      font-family: 'Playfair Display', serif;
      letter-spacing: 2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    #result-notice.show { top: 50px; }
    .notice-small { font-size: 10px; color: var(--gold-royal); letter-spacing: 4px; }

    h1 {
      margin-top: 30px;
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 8vw, 36px);
      color: var(--deep-forest);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .wheel-main-container {
      position: relative;
      width: 90vw;
      max-width: 380px;
      margin: 30px auto;
    }

    .pointer {
      width: 0; height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 40px solid var(--deep-forest);
      position: absolute;
      top: -15px; left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
    }

    canvas {
      width: 100%;
      border-radius: 50%;
      border: 12px solid white;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      transition: transform 6.5s cubic-bezier(0.15, 0, 0.15, 1);
    }

    button {
      margin-top: 30px;
      padding: 22px 70px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 3px;
      border: none;
      background: linear-gradient(135deg, var(--deep-forest), #0e241f);
      color: white;
      border-radius: 50px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: all 0.3s;
    }
    button:active { transform: scale(0.95); }
    button:hover { box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
    button:disabled { background: #bbb; cursor: not-allowed; }
  </style>
</head>

<body>

<div id="result-notice">
  <span class="notice-small">OFFICIAL RESULT</span>
  <span id="prize-text">TRY AGAIN</span>
</div>

<h1>🎯 BROXY ROYALE SPIN</h1>
<span id="spinCountDisplay" style="color: var(--deep-forest); font-weight: 900; margin-bottom: 20px; display: block;">SPINS LEFT: <span id="sCount">3</span></span>

<div class="wheel-main-container">
  <div class="pointer"></div>
  <canvas id="wheel" width="500" height="500"></canvas>
</div>

<button id="spinBtn">Spin Now</button>

<audio id="tickSound" src="https://www.soundjay.com/buttons/button-10.mp3"></audio>
<audio id="winSound" src="https://www.myinstants.com/media/sounds/tada.mp3"></audio>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spinBtn");
const sCount = document.getElementById("sCount");
const notice = document.getElementById("result-notice");
const prizeText = document.getElementById("prize-text");
const tickSound = document.getElementById("tickSound");
const winSound = document.getElementById("winSound");

let spins = parseInt(localStorage.getItem('mlbb_spins')) || 3;
sCount.innerText = spins;

// PRIZES KEPT EXACTLY AS REQUESTED
const sections = ["Try Again", "2 Diamonds", "1💎", "Try Again", "REDEEM CODE", "1+ Spin", "Try Again", "10💎"];
const colors = ["#f4d3d3","#d1e7dd","#cfe2f3","#fff3cd","#e2e3e5","#f8d7da","#e0fbfc","#ffefdb"];
const total = sections.length;
const arc = 2 * Math.PI / total;
let currentDeg = 0;

function drawWheel() {
  for (let i = 0; i < total; i++) {
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(250,250);
    ctx.arc(250,250,250,i*arc,(i+1)*arc);
    ctx.fill();
    ctx.save();
    ctx.translate(250,250);
    ctx.rotate(i*arc + arc/2);
    ctx.fillStyle="#333";
    ctx.font = "bold 18px Montserrat";
    ctx.textAlign = "right";
    ctx.fillText(sections[i], 230, 10);
    ctx.restore();
  }
}
drawWheel();

spinBtn.onclick = function () {
  if (spins <= 0) return alert("NO SPINS LEFT!");
  
  spins--;
  localStorage.setItem('mlbb_spins', spins);
  sCount.innerText = spins;
  spinBtn.disabled = true;

  // --- RIGGED IMPOSSIBLE MATH ---
  const rand = Math.random() * 100;
  let winningIndex;
  
  if (rand <= 0.05) winningIndex = 2;      // 1💎 (0.05%)
  else if (rand <= 0.10) winningIndex = 4; // REDEEM CODE (0.05%)
  else if (rand <= 0.15) winningIndex = 7; // 10💎 (0.05%)
  else if (rand <= 20) winningIndex = 1;   // 2 Diamonds (20%)
  else if (rand <= 35) winningIndex = 5;   // 1+ Spin (15%)
  else winningIndex = [0, 3, 6][Math.floor(Math.random() * 3)]; // Try Again (Rest)

  const sliceDeg = 360 / total;
  const stopAt = (360 - (winningIndex * sliceDeg)) - (sliceDeg / 2);
  
  currentDeg += 3600 + stopAt + (360 - (currentDeg % 360));
  canvas.style.transform = `rotate(${currentDeg}deg)`;

  let soundLoop = setInterval(() => {
      tickSound.currentTime = 0;
      tickSound.play();
  }, 160);

  setTimeout(() => {
    clearInterval(soundLoop);
    
    // UPDATE PROFESSIONAL NOTICE
    const result = sections[winningIndex];
    prizeText.innerText = result;
    
    if (winningIndex === 2 || winningIndex === 4 || winningIndex === 7) {
        notice.style.borderColor = "#ffd700";
        winSound.play();
        confetti({ particleCount: 250, spread: 100, origin: { y: 0.6 }, colors: ['#ffd700', '#ffffff'] });
    } else {
        notice.style.borderColor = "white";
    }

    notice.classList.add("show");
    spinBtn.disabled = false;

    setTimeout(() => notice.classList.remove("show"), 5000);
  }, 6500);
};
</script>
</body>
</html>
