<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const sections = ["Try Again", "2 Diamonds", "1💎", "Try Again", "REDEEM CODE", "1+ Spin", "Try Again", "10💎"];
const colors = ["#f4d3d3","#d1e7dd","#cfe2f3","#fff3cd","#e2e3e5","#f8d7da","#e0fbfc","#ffefdb"];

const total = sections.length;
const arc = 2 * Math.PI / total;

let currentDeg = 0;

function draw() {
  for (let i = 0; i < total; i++) {
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(250,250);
    ctx.arc(250,250,250,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(250,250);
    ctx.rotate(i*arc + arc/2);
    ctx.fillStyle="#222";
    ctx.font="bold 18px Montserrat";
    ctx.textAlign="right";
    ctx.fillText(sections[i], 230, 10);
    ctx.restore();
  }
}
draw();

document.getElementById("spinBtn").onclick = function() {
  this.disabled = true;

  const rand = Math.random() * 100;
  let winIdx;

  // 🎯 balanced rig
  if (rand <= 1) winIdx = 2;       // 1💎
  else if (rand <= 2) winIdx = 4;  // CODE
  else if (rand <= 3) winIdx = 7;  // 10💎
  else winIdx = [0,1,3,5,6][Math.floor(Math.random()*5)];

  const sliceDeg = 360 / total;

  // ✅ FIXED ANGLE CALCULATION
  const targetDeg = (winIdx * sliceDeg) + (sliceDeg / 2);

  const spinDeg = 360 * 8 + (360 - targetDeg);

  currentDeg += spinDeg;

  canvas.style.transition = "transform 6s cubic-bezier(0.25, 1, 0.5, 1)";
  canvas.style.transform = `rotate(${currentDeg}deg)`;

  const tickSound = document.getElementById("tickSound");

  let tickInterval = setInterval(() => {
    tickSound.currentTime = 0;
    tickSound.play();
  }, 120);

  setTimeout(() => {
    clearInterval(tickInterval);

    const prize = sections[winIdx];

    document.getElementById("prize-text").innerText = prize;

    // 🎉 BIG CELEBRATION
    if ([2,4,7].includes(winIdx)) {
      document.getElementById("winSound").play();

      // multi burst confetti
      confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
      setTimeout(() => confetti({ particleCount: 100, spread: 100 }), 300);
      setTimeout(() => confetti({ particleCount: 200, spread: 120 }), 600);

      // glow effect
      document.getElementById("result-notice").style.boxShadow =
        "0 0 40px gold, 0 0 80px rgba(255,215,0,0.6)";
    }

    document.getElementById("result-notice").classList.add("show");

    this.disabled = false;

    setTimeout(() => {
      document.getElementById("result-notice").classList.remove("show");
      document.getElementById("result-notice").style.boxShadow = "";
    }, 4000);

  }, 6000);
};
</script>
