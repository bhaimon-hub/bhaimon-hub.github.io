<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROXY | Weekly Giveaway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e14; color: white; font-family: 'Rajdhani', sans-serif; }
        .wheel-container { position: relative; width: 320px; height: 320px; }
        #canvas { width: 100%; height: 100%; transform: rotate(0deg); transition: transform 5s cubic-bezier(0.1, 0.8, 0.1, 1); }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); z-index: 10; color: #ff8c00; font-size: 40px; }
    </style>
</head>
<body class="flex flex-col items-center p-6">
    <nav class="w-full max-w-7xl flex justify-between mb-12 border-b border-gray-800 pb-4">
        <h1 class="text-2xl font-black italic uppercase">BROXY <span class="text-orange-500">GIVEAWAY</span></h1>
        <a href="index.html" class="text-orange-500 font-bold">Back to Home</a>
    </nav>

    <div class="bg-[#151921] p-10 rounded-[40px] border border-gray-800 shadow-2xl flex flex-col items-center">
        <div class="wheel-container mb-8">
            <div class="pointer">▼</div>
            <canvas id="canvas" width="500" height="500"></canvas>
        </div>
        <button id="spin-btn" onclick="spin()" class="bg-orange-500 text-black px-12 py-4 rounded-2xl font-black text-xl hover:scale-110 transition shadow-lg shadow-orange-500/40">SPIN NOW</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const prizes = ["1 Diamond", "Try Again", "Redeem Code", "1+ Spin", "Try Again"];
        const colors = ["#ff8c00", "#1c222d", "#ff4500", "#1c222d", "#ff0000"];
        
        function drawWheel() {
            const arc = (2 * Math.PI) / prizes.length;
            for (let i = 0; i < prizes.length; i++) {
                ctx.fillStyle = colors[i];
                ctx.beginPath();
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, i * arc, (i + 1) * arc);
                ctx.fill();
                ctx.save();
                ctx.fillStyle = "white";
                ctx.translate(250, 250);
                ctx.rotate(i * arc + arc / 2);
                ctx.font = "bold 25px Arial";
                ctx.fillText(prizes[i], 100, 10);
                ctx.restore();
            }
        }
        drawWheel();

        let currentRotation = 0;
        function spin() {
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            
            // Winning logic: Rigging the 0.05% chance
            const random = Math.random() * 100;
            let targetPrizeIndex;
            
            if (random <= 0.05) { // 0.05% chance for 1 Diamond
                targetPrizeIndex = 0;
            } else if (random <= 0.1) { // 0.05% chance for Redeem Code
                targetPrizeIndex = 2;
            } else { // 99.9% chance for Try Again or 1+ Spin
                const losingIndices = [1, 3, 4];
                targetPrizeIndex = losingIndices[Math.floor(Math.random() * losingIndices.length)];
            }

            const degreesPerPrize = 360 / prizes.length;
            const extraRounds = 3600; // 10 full spins
            const targetRotation = extraRounds + (360 - (targetPrizeIndex * degreesPerPrize));
            
            currentRotation += targetRotation;
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                alert("Result: " + prizes[targetPrizeIndex]);
                btn.disabled = false;
            }, 5000);
        }
    </script>
</body>
</html>
