<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROXY | Weekly Giveaway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e14; color: white; font-family: 'Rajdhani', sans-serif; display: flex; flex-col; items-center; justify-center; min-h-screen; }
        .wheel-container { position: relative; width: 350px; height: 350px; }
        canvas { width: 100%; height: 100%; transition: transform 5s cubic-bezier(0.1, 0.8, 0.1, 1); border-radius: 50%; border: 10px solid #1c222d; box-shadow: 0 0 40px #ff8c00; }
        .pointer { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 50px; color: #ff8c00; z-index: 10; }
    </style>
</head>
<body class="flex flex-col items-center p-6">
    <nav class="w-full flex justify-between p-6 absolute top-0"><h1 class="text-2xl font-black italic">BROXY <span class="text-orange-500">GIVEAWAY</span></h1><a href="index.html" class="text-orange-500 font-bold">BACK HOME</a></nav>
    
    <div class="bg-[#151921] p-12 rounded-[50px] flex flex-col items-center mt-20">
        <div class="wheel-container mb-10"><div class="pointer">▼</div><canvas id="wheel" width="500" height="500"></canvas></div>
        <button id="spin-btn" onclick="spin()" class="bg-orange-500 text-black px-12 py-4 rounded-3xl font-black text-xl hover:scale-110 transition shadow-xl">SPIN NOW</button>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const prizes = ["1 Diamond", "Try Again", "Redeem Code", "1+ Spin", "Try Again"];
        const colors = ["#ff8c00", "#1c222d", "#ff4500", "#1c222d", "#ff0000"];
        
        function draw() {
            const arc = (2 * Math.PI) / prizes.length;
            for(let i=0; i<prizes.length; i++) {
                ctx.fillStyle = colors[i]; ctx.beginPath(); ctx.moveTo(250,250); ctx.arc(250,250,250,i*arc,(i+1)*arc); ctx.fill();
                ctx.save(); ctx.fillStyle = "white"; ctx.translate(250,250); ctx.rotate(i*arc+arc/2); ctx.font = "bold 25px Arial"; ctx.fillText(prizes[i], 100, 10); ctx.restore();
            }
        }
        draw();

        let deg = 0;
        function spin() {
            const btn = document.getElementById('spin-btn'); btn.disabled = true;
            const rand = Math.random() * 100;
            let winIdx = rand <= 0.05 ? 0 : (rand <= 0.1 ? 2 : [1,3,4][Math.floor(Math.random()*3)]);
            const targetDeg = 3600 + (360 - (winIdx * (360/prizes.length)));
            deg += targetDeg; canvas.style.transform = `rotate(${deg}deg)`;
            setTimeout(() => { alert("Result: " + prizes[winIdx]); btn.disabled = false; }, 5500);
        }
    </script>
</body>
</html>
