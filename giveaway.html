<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Spin Fix</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #f5f5f5;
}

#wheelBox {
  position: relative;
  width: 350px;
  margin: 40px auto;
}

.pointer {
  position: absolute;
  left: 50%;
  top: -10px;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-top: 35px solid black;
  z-index: 10;
}

canvas {
  width: 100%;
  border-radius: 50%;
  border: 10px solid white;
}

button {
  padding: 12px 40px;
  margin-top: 20px;
  cursor: pointer;
}

#result {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>🎯 FIXED SPIN</h2>

<div id="wheelBox">
  <div class="pointer"></div>
  <canvas id="wheel" width="500" height="500"></canvas>
</div>

<button onclick="spin()">Spin</button>
<div id="result"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const sections = ["Try Again", "2💎", "1💎", "Try Again", "CODE", "1 Spin", "Try Again", "10💎"];
const colors = ["#f4d3d3","#d1e7dd","#cfe2f3","#fff3cd","#e2e3e5","#f8d7da","#e0fbfc","#ffefdb"];

const total = sections.length;
const arc = 2 * Math.PI / total;

// draw wheel
for (let i = 0; i < total; i++) {
  ctx.beginPath();
  ctx.fillStyle = colors[i];
  ctx.moveTo(250,250);
  ctx.arc(250,250,250,i*arc,(i+1)*arc);
  ctx.fill();

  ctx.save();
  ctx.translate(250,250);
  ctx.rotate(i*arc + arc/2);
  ctx.fillStyle="#000";
  ctx.textAlign="right";
  ctx.font="bold 16px Arial";
  ctx.fillText(sections[i], 220, 10);
  ctx.restore();
}

function spin() {

  // 🎯 EXTREME RARE SYSTEM
const rand = Math.random() * 100;
let winIdx;

// 0.05% each (VERY RARE)
if (rand < 0.05) {
  winIdx = 7; // 10💎
} else if (rand < 0.10) {
  winIdx = 2; // 1💎
} else if (rand < 0.15) {
  winIdx = 4; // CODE
} else {
  // 99.85% chance → mostly "Try Again"
  const common = [0, 3, 6]; // Try Again indexes
  winIdx = common[Math.floor(Math.random() * common.length)];
}

  const sliceDeg = 360 / total;

  // 🎯 EXACT CENTER landing
  const targetAngle = (winIdx * sliceDeg) + sliceDeg/2;

  // 🎯 convert for top pointer
  const finalAngle = 360 - targetAngle - 90;

  // 🎯 ALWAYS RESET ROTATION (NO DRIFT BUG)
  const totalRotation = 360 * 6 + finalAngle;

  canvas.style.transition = "none";
  canvas.style.transform = `rotate(0deg)`;

  // force reset
  canvas.offsetHeight;

  canvas.style.transition = "transform 5s cubic-bezier(0.25,1,0.5,1)";
  canvas.style.transform = `rotate(${totalRotation}deg)`;

  setTimeout(() => {
    const result = sections[winIdx];
    document.getElementById("result").innerText = "You got: " + result;

    if ([2,4,7].includes(winIdx)) {
      confetti({ particleCount: 200, spread: 100 });
    }
  }, 5000);
}
</script>

</body>
</html>
