<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROXY | Royale Giveaway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0b0e14; 
            background-image: radial-gradient(circle at center, #1a1f2b 0%, #0b0e14 100%);
            color: white; 
            font-family: 'Rajdhani', sans-serif; 
            min-h-screen; 
            overflow-x: hidden;
        }
        
        /* Gold Border & Glow Effect */
        .wheel-outer-border {
            position: relative;
            padding: 15px;
            background: linear-gradient(145deg, #ffd700, #b8860b, #8b6508);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4), inset 0 0 20px rgba(0,0,0,0.5);
        }

        .wheel-container {
            position: relative;
            width: 340px;
            height: 340px;
            border: 5px solid #222;
            border-radius: 50%;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
        }

        /* The Gold Center Button */
        .spin-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ffd700 0%, #8b6508 100%);
            border: 4px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #000;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            text-shadow: 0 1px 0 rgba(255,255,255,0.5);
        }

        .spin-center:active { transform: translate(-50%, -45%) scale(0.95); }

        .ticker {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            background: #ffd700;
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            z-index: 30;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6 min-h-screen">

    <nav class="w-full flex justify-between p-6 absolute top-0">
        <h1 class="text-2xl font-black italic tracking-tighter">BROXY <span class="text-orange-500">ROYALE</span></h1>
        <a href="index.html" class="text-orange-500 font-bold border-b-2 border-orange-500">EXIT</a>
    </nav>
    
    <div class="text-center mb-8">
        <h2 class="text-4xl font-black italic uppercase tracking-widest text-white shadow-orange-500 drop-shadow-lg">Lucky Spinning Wheel</h2>
        <p class="text-gray-500 text-xs mt-2 uppercase font-bold tracking-[0.3em]">Premium Giveaway Edition</p>
    </div>

    <div class="wheel-outer-border">
        <div class="ticker"></div>
        <div class="wheel-container">
            <canvas id="wheel" width="500" height="500"></canvas>
            <div class="spin-center" onclick="spin()">SPIN</div>
        </div>
    </div>

    <!-- AUDIO ELEMENTS -->
    <audio id="tickSound" src="https://www.soundjay.com/buttons/button-10.mp3"></audio>
    <audio id="winSound" src="https://www.myinstants.com/media/sounds/tada.mp3"></audio>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const tickSound = document.getElementById('tickSound');
        const winSound = document.getElementById('winSound');

        const prizes = [
            { label: "1 DIAMOND", color: "#6a0dad", chance: 0.05 }, // Purple (Elite)
            { label: "TRY AGAIN", color: "#1c222d", chance: 49.9 }, // Dark
            { label: "REDEEM CODE", color: "#ffd700", chance: 0.05 }, // Gold (Elite)
            { label: "1+ SPIN", color: "#ff4500", chance: 15.0 }, // Orange
            { label: "TRY AGAIN", color: "#0b0e14", chance: 35.0 }  // Black
        ];

        const totalPrizes = prizes.length;
        const arc = (2 * Math.PI) / totalPrizes;

        function draw() {
            ctx.clearRect(0,0,500,500);
            for(let i=0; i<totalPrizes; i++) {
                const angle = i * arc;
                
                // Draw Section
                ctx.fillStyle = prizes[i].color;
                ctx.beginPath();
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, angle, angle + arc);
                ctx.lineTo(250, 250);
                ctx.fill();
                ctx.strokeStyle = "rgba(212, 175, 55, 0.5)";
                ctx.lineWidth = 4;
                ctx.stroke();

                // Draw Text
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "900 24px Rajdhani";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "black";
                ctx.fillText(prizes[i].label, 230, 10);
                ctx.restore();
            }
        }
        draw();

        let isSpinning = false;
        let currentRotation = 0;

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            // Winning Logic (Rigged Math)
            const rand = Math.random() * 100;
            let winIdx;
            
            if (rand <= 0.05) winIdx = 0; // 1 Diamond
            else if (rand <= 0.1) winIdx = 2; // Redeem Code
            else if (rand <= 15) winIdx = 3; // 1+ Spin
            else winIdx = Math.random() > 0.5 ? 1 : 4; // Try Again

            // Perfect Centering Logic
            // The ticker is at the top (270 degrees in canvas math).
            // We need the center of the prize slice to land at the top.
            const extraSpins = 3600; // 10 rounds
            const prizeSliceDeg = 360 / totalPrizes;
            
            // This formula ensures the slice is perfectly centered under the ticker
            const targetRotation = extraSpins + (360 - (winIdx * prizeSliceDeg)) - (prizeSliceDeg / 2);
            
            currentRotation += targetRotation;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // Sound Effect Loop
            let soundInterval = setInterval(() => {
                tickSound.currentTime = 0;
                tickSound.play();
            }, 150);

            setTimeout(() => {
                clearInterval(soundInterval);
                isSpinning = false;
                
                // Celebration Logic
                if (winIdx === 0 || winIdx === 2) {
                    winSound.play();
                    confetti({
                        particleCount: 150,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#ffd700', '#ffffff', '#ff4500']
                    });
                }

                // Smooth alert
                setTimeout(() => {
                    alert("RESULT: " + prizes[winIdx].label);
                }, 500);
                
            }, 6000);
        }
    </script>
</body>
</html>
