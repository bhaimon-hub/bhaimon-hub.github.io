<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB Lucky Spin | Broxy Hub</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">

<style>
body {
  background: #fbfbf8;
  text-align: center;
  font-family: 'Montserrat', sans-serif;
}

#wheelBox {
  position: relative;
  width: 350px;
  margin: 40px auto;
}

.pointer {
  position: absolute;
  left: 50%;
  top: -10px;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-top: 35px solid #1a3c34;
  z-index: 10;
}

canvas {
  width: 100%;
  border-radius: 50%;
  border: 10px solid white;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

button {
  padding: 15px 50px;
  margin-top: 20px;
  font-weight: bold;
  border: none;
  background: #1a3c34;
  color: white;
  border-radius: 40px;
  cursor: pointer;
}

#result {
  margin-top: 20px;
  font-size: 22px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>🎯 BROXY SPIN</h2>

<div id="wheelBox">
  <div class="pointer"></div>
  <canvas id="wheel" width="500" height="500"></canvas>
</div>

<button onclick="spin()" id="spinBtn">Spin</button>

<div id="result"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const sections = ["Try Again", "2💎", "1💎", "Try Again", "CODE", "1 Spin", "Try Again", "10💎"];
const colors = ["#f4d3d3","#d1e7dd","#cfe2f3","#fff3cd","#e2e3e5","#f8d7da","#e0fbfc","#ffefdb"];

const total = sections.length;
const arc = 2 * Math.PI / total;

let rotation = 0;

function drawWheel() {
  for (let i = 0; i < total; i++) {
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(250,250);
    ctx.arc(250,250,250,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(250,250);
    ctx.rotate(i*arc + arc/2);
    ctx.fillStyle = "#222";
    ctx.textAlign = "right";
    ctx.font = "bold 16px Montserrat";
    ctx.fillText(sections[i], 220, 10);
    ctx.restore();
  }
}

drawWheel();

function spin() {
  const btn = document.getElementById("spinBtn");
  btn.disabled = true;

  // 🎯 choose result
  const rand = Math.random()*100;
  let winIdx;

  if (rand < 2) winIdx = 7;       // 10💎 rare
  else if (rand < 4) winIdx = 4;  // code
  else if (rand < 6) winIdx = 2;  // 1💎
  else winIdx = Math.floor(Math.random()*total);

  const sliceDeg = 360 / total;

  // 🎯 PERFECT ALIGNMENT (THIS IS THE FIX)
  const angle = (winIdx * sliceDeg) + sliceDeg/2;
  const finalRotation = 360 - angle - 90;

  const spins = 360 * 6;

  rotation += spins + finalRotation;

  canvas.style.transition = "transform 5s cubic-bezier(0.25,1,0.5,1)";
  canvas.style.transform = `rotate(${rotation}deg)`;

  setTimeout(() => {
    const result = sections[winIdx];
    document.getElementById("result").innerText = "You got: " + result;

    if ([2,4,7].includes(winIdx)) {
      confetti({ particleCount: 200, spread: 100 });
    }

    btn.disabled = false;
  }, 5000);
}
</script>

</body>
</html>
