<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BROXY | Royale Lucky Spin</title>
  
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2649315592388720" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --gold-primary: #ffd700;
      --gold-dark: #8b6508;
      --bg-dark: #0b0e14;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      margin: 0;
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at center, #1a1f2b 0%, var(--bg-dark) 100%);
      color: white;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      padding-bottom: 100px;
    }

    /* CUSTOM RESULT NOTICE */
    #result-notice {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      padding: 15px 50px;
      border-radius: 50px;
      font-weight: 900;
      text-transform: uppercase;
      transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      border: 2px solid var(--gold-primary);
      background: #1f2937;
    }
    #result-notice.show { top: 40px; }

    h1 {
      margin-top: 30px;
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 8vw, 42px);
      color: var(--gold-primary);
      text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    }

    /* WHEEL CASINO DESIGN */
    .wheel-outer-border {
      position: relative;
      padding: 12px;
      background: linear-gradient(145deg, var(--gold-primary), var(--gold-dark));
      border-radius: 50%;
      box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
      width: 90vw;
      max-width: 360px;
      margin: 20px auto;
    }

    .pointer {
      width: 0; height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 35px solid var(--gold-primary);
      position: absolute;
      top: -15px; left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
    }

    canvas {
      width: 100%;
      border-radius: 50%;
      background: #111;
      transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
    }

    button {
      margin-top: 25px;
      padding: 18px 60px;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: none;
      background: linear-gradient(to bottom, var(--gold-primary), var(--gold-dark));
      color: #000;
      border-radius: 50px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    }

    button:disabled { background: #555; color: #888; }
  </style>
</head>

<body>

<div id="result-notice"></div>

<h1>🎯 BROXY ROYALE SPIN</h1>
<span id="spinCountDisplay" style="color: #aaa; margin-top: 10px; display: block;">Available Spins: <span id="sCount" style="color: var(--gold-primary)">3</span></span>

<div class="wheel-outer-border">
  <div class="pointer"></div>
  <canvas id="wheel" width="500" height="500"></canvas>
</div>

<button id="spinBtn">Spin Now</button>

<audio id="tickSound" src="https://www.soundjay.com/buttons/button-10.mp3"></audio>
<audio id="winSound" src="https://www.myinstants.com/media/sounds/tada.mp3"></audio>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spinBtn");
const sCount = document.getElementById("sCount");
const notice = document.getElementById("result-notice");
const tickSound = document.getElementById("tickSound");
const winSound = document.getElementById("winSound");

let spins = parseInt(localStorage.getItem('mlbb_spins')) || 3;
sCount.innerText = spins;

const sections = ["1💎", "Try Again", "CODE", "1+ Spin", "Try Again", "1💎", "Try Again", "JACKPOT"];
const colors = ["#6a0dad", "#1c222d", "#ffd700", "#ff4500", "#0b0e14", "#6a0dad", "#1c222d", "#b8860b"];
const total = sections.length;
const arc = 2 * Math.PI / total;
let currentDeg = 0;

function drawWheel() {
  for (let i = 0; i < total; i++) {
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(250,250);
    ctx.arc(250,250,250,i*arc,(i+1)*arc);
    ctx.fill();
    ctx.strokeStyle = "rgba(255,215,0,0.3)";
    ctx.lineWidth = 2;
    ctx.stroke();
    
    ctx.save();
    ctx.translate(250,250);
    ctx.rotate(i*arc + arc/2);
    ctx.fillStyle="white";
    ctx.font = "bold 22px Rajdhani";
    ctx.textAlign = "right";
    ctx.fillText(sections[i], 230, 10);
    ctx.restore();
  }
}
drawWheel();

spinBtn.onclick = function () {
  if (spins <= 0) {
      notice.innerHTML = "No Spins Left!";
      notice.style.backgroundColor = "#555";
      notice.classList.add("show");
      setTimeout(() => notice.classList.remove("show"), 3000);
      return;
  }
  
  spins--;
  localStorage.setItem('mlbb_spins', spins);
  sCount.innerText = spins;
  spinBtn.disabled = true;

  // RIGGED LOGIC: 0.05% chance for Diamond/Jackpot/Code
  const rand = Math.random() * 100;
  let winningIndex;
  if (rand <= 0.05) winningIndex = 0; // 1💎
  else if (rand <= 0.1) winningIndex = 7; // JACKPOT
  else if (rand <= 0.15) winningIndex = 2; // CODE
  else winningIndex = [1, 3, 4, 6].sort(() => 0.5 - Math.random())[0];

  const sliceDeg = 360 / total;
  // Perfect Center Stop Fix
  const stopAt = (360 - (winningIndex * sliceDeg)) - (sliceDeg / 2);
  
  currentDeg += 3600 + stopAt + (360 - (currentDeg % 360));
  canvas.style.transform = `rotate(${currentDeg}deg)`;

  let soundInterval = setInterval(() => {
      tickSound.currentTime = 0;
      tickSound.play();
  }, 150);

  setTimeout(() => {
    clearInterval(soundInterval);
    isSpinning = false;
    
    const resultText = sections[winningIndex];
    notice.innerHTML = `Result: ${resultText}`;
    notice.style.backgroundColor = (winningIndex === 0 || winningIndex === 2 || winningIndex === 7) ? "#ef4444" : "#1f2937";
    notice.classList.add("show");

    if (winningIndex === 0 || winningIndex === 2 || winningIndex === 7) {
        winSound.play();
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }

    spinBtn.disabled = false;
    setTimeout(() => notice.classList.remove("show"), 4000);
  }, 6000);
};
</script>
</body>
</html>
