<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROXY | Royale Giveaway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0b0e14; 
            background-image: radial-gradient(circle at center, #1a1f2b 0%, #0b0e14 100%), url('https://www.transparenttextures.com/patterns/dark-matter.png');
            color: white; 
            font-family: 'Rajdhani', sans-serif; 
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Luxury Casino Glow */
        .page-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .wheel-outer-border {
            position: relative;
            padding: 15px;
            background: linear-gradient(145deg, #ffd700, #b8860b, #8b6508);
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(212, 175, 55, 0.3), inset 0 0 20px rgba(0,0,0,0.5);
            margin: 20px auto;
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            border: 6px solid #111;
            border-radius: 50%;
            background: #111;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 50px;
            background: #ffd700;
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            z-index: 30;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8));
        }

        .spin-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ffd700 0%, #8b6508 100%);
            border: 4px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #000;
            cursor: pointer;
            z-index: 40;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
            font-family: 'Oswald', sans-serif;
        }

        #result-notice {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            padding: 15px 50px;
            border-radius: 50px;
            font-weight: 900;
            text-transform: uppercase;
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 2px solid gold;
        }
        #result-notice.show { top: 40px; }
    </style>
</head>
<body>

    <nav class="w-full flex justify-between p-6 absolute top-0 z-50">
        <h1 class="text-2xl font-black italic">BROXY <span class="text-orange-500">ROYALE</span></h1>
        <a href="index.html" class="text-orange-500 font-bold border-b-2 border-orange-500 hover:text-white hover:border-white transition">EXIT HUB</a>
    </nav>
    
    <div class="page-container">
        <div class="text-center mb-6">
            <h2 class="text-4xl md:text-5xl font-black italic uppercase text-white tracking-tighter" style="text-shadow: 0 0 20px rgba(255,140,0,0.8)">Lucky Spinning Wheel</h2>
            <p class="text-gray-500 text-xs mt-2 uppercase font-bold tracking-[0.3em]">Premium Giveaway Edition</p>
        </div>

        <div class="wheel-outer-border">
            <div class="pointer"></div>
            <div class="wheel-container">
                <canvas id="wheel" width="500" height="500"></canvas>
                <div class="spin-center" onclick="spin()">SPIN</div>
            </div>
        </div>
    </div>

    <div id="result-notice"></div>

    <!-- AUDIO -->
    <audio id="tickSound" src="https://www.soundjay.com/buttons/button-10.mp3"></audio>
    <audio id="winSound" src="https://www.myinstants.com/media/sounds/tada.mp3"></audio>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const tickSound = document.getElementById('tickSound');
        const winSound = document.getElementById('winSound');
        const notice = document.getElementById('result-notice');

        const prizes = [
            { label: "1 DIAMOND", color: "#6a0dad" },
            { label: "TRY AGAIN", color: "#1c222d" },
            { label: "REDEEM CODE", color: "#ffd700" },
            { label: "1+ SPIN", color: "#ff4500" },
            { label: "TRY AGAIN", color: "#0b0e14" }
        ];

        const totalPrizes = prizes.length;
        const arc = (2 * Math.PI) / totalPrizes;

        function draw() {
            ctx.clearRect(0,0,500,500);
            for(let i=0; i<totalPrizes; i++) {
                const angle = i * arc;
                ctx.fillStyle = prizes[i].color;
                ctx.beginPath();
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, angle, angle + arc);
                ctx.fill();
                ctx.strokeStyle = "#ffd70044";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 22px Rajdhani";
                ctx.fillText(prizes[i].label, 230, 10);
                ctx.restore();
            }
        }
        draw();

        let isSpinning = false;
        let rotation = 0;

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            const rand = Math.random() * 100;
            let winIdx;
            
            if (rand <= 0.05) winIdx = 0; // Rigged
            else if (rand <= 0.1) winIdx = 2; // Rigged
            else if (rand <= 15) winIdx = 3;
            else winIdx = Math.random() > 0.5 ? 1 : 4;

            const extraSpins = 3600;
            const prizeSliceDeg = 360 / totalPrizes;
            
            // MATH FIX: Centers the prize under the pointer
            const targetRotation = (360 - (winIdx * prizeSliceDeg)) - (prizeSliceDeg / 2);
            rotation += extraSpins + targetRotation;
            
            canvas.style.transform = `rotate(${rotation}deg)`;

            let soundLoop = setInterval(() => {
                tickSound.currentTime = 0;
                tickSound.play();
            }, 120);

            setTimeout(() => {
                clearInterval(soundLoop);
                isSpinning = false;
                
                notice.innerHTML = prizes[winIdx].label;
                notice.style.backgroundColor = (winIdx === 0 || winIdx === 2) ? "#ef4444" : "#1f2937";
                notice.classList.add("show");

                if (winIdx === 0 || winIdx === 2) {
                    winSound.play();
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }

                setTimeout(() => { notice.classList.remove("show"); }, 4000);
            }, 6000);
        }
    </script>
</body>
</html>
