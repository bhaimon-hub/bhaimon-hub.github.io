<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB Lucky Spin | Broxy Hub</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
:root {
  --deep-forest: #1a3c34;
  --cream: #fbfbf8;
  --gold: #ffd700;
}

body {
  background-color: var(--cream);
  background-image: linear-gradient(rgba(251, 251, 248, 0.9), rgba(251, 251, 248, 0.9)), url('1000117952.jpg');
  background-size: cover;
  text-align: center;
  font-family: 'Montserrat', sans-serif;
}

/* 🔥 UPDATED PROFESSIONAL RESULT BOX */
#result-notice {
  position: fixed;
  top: -150px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1001;
  padding: 25px 80px;
  border-radius: 20px;
  transition: all 0.7s cubic-bezier(0.2, 1, 0.3, 1);

  backdrop-filter: blur(15px);
  background: rgba(15, 20, 30, 0.7);

  border: 2px solid rgba(255,255,255,0.2);
  color: white;

  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

#result-notice.show {
  top: 50px;
}

.wheel-main-container {
  position: relative;
  width: 90vw;
  max-width: 380px;
  margin: 30px auto;
}

.pointer {
  width: 0;
  height: 0;
  border-left: 20px solid transparent;
  border-right: 20px solid transparent;
  border-top: 40px solid var(--deep-forest);
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
}

canvas {
  width: 100%;
  border-radius: 50%;
  border: 12px solid white;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
}

button {
  margin-top: 30px;
  padding: 20px 70px;
  background: var(--deep-forest);
  color: white;
  border-radius: 50px;
  font-weight: 900;
  cursor: pointer;
  border: none;
}
</style>

</head>

<body>

<div id="result-notice">
  <div style="font-size:10px; color:gold; letter-spacing:3px;">ROYALE RESULT</div>
  <div id="prize-text">TRY AGAIN</div>
</div>

<h1>🎯 BROXY ROYALE SPIN</h1>

<div class="wheel-main-container">
  <div class="pointer"></div>
  <canvas id="wheel" width="500" height="500"></canvas>
</div>

<button id="spinBtn">Spin Now</button>

<audio id="tickSound" src="https://www.soundjay.com/buttons/button-10.mp3"></audio> <audio id="winSound" src="https://www.myinstants.com/media/sounds/tada.mp3"></audio>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const sections = ["Try Again", "2 Diamonds", "1💎", "Try Again", "REDEEM CODE", "1+ Spin", "Try Again", "10💎"];
const colors = ["#f4d3d3","#d1e7dd","#cfe2f3","#fff3cd","#e2e3e5","#f8d7da","#e0fbfc","#ffefdb"];

const total = sections.length;
const arc = 2 * Math.PI / total;

let currentDeg = 0;

function draw() {
  for (let i = 0; i < total; i++) {
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(250,250);
    ctx.arc(250,250,250,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(250,250);
    ctx.rotate(i*arc + arc/2);
    ctx.fillStyle="#222";
    ctx.font="bold 18px Montserrat";
    ctx.textAlign="right";
    ctx.fillText(sections[i], 230, 10);
    ctx.restore();
  }
}
draw();

document.getElementById("spinBtn").onclick = function() {
  this.disabled = true;

  const rand = Math.random() * 100;
  let winIdx;

  if (rand <= 1) winIdx = 2;
  else if (rand <= 2) winIdx = 4;
  else if (rand <= 3) winIdx = 7;
  else winIdx = [0,1,3,5,6][Math.floor(Math.random()*5)];

  const sliceDeg = 360 / total;

  const targetDeg = (winIdx * sliceDeg) + (sliceDeg / 2);
  const spinDeg = 360 * 8 + (360 - targetDeg);

  currentDeg += spinDeg;

  canvas.style.transition = "transform 6s cubic-bezier(0.25, 1, 0.5, 1)";
  canvas.style.transform = `rotate(${currentDeg}deg)`;

  const tickSound = document.getElementById("tickSound");

  let tickInterval = setInterval(() => {
    tickSound.currentTime = 0;
    tickSound.play();
  }, 120);

  setTimeout(() => {
    clearInterval(tickInterval);

    const prize = sections[winIdx];
    document.getElementById("prize-text").innerText = prize;

    if ([2,4,7].includes(winIdx)) {
      document.getElementById("winSound").play();

      confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
      setTimeout(() => confetti({ particleCount: 100, spread: 100 }), 300);
      setTimeout(() => confetti({ particleCount: 200, spread: 120 }), 600);

      document.getElementById("result-notice").style.boxShadow =
        "0 0 40px gold, 0 0 80px rgba(255,215,0,0.6)";
    }

    document.getElementById("result-notice").classList.add("show");

    this.disabled = false;

    setTimeout(() => {
      document.getElementById("result-notice").classList.remove("show");
      document.getElementById("result-notice").style.boxShadow = "";
    }, 4000);

  }, 6000);
};
</script>

</body>
</html>
