<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROXY | All Videos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0e14] text-white">
    <nav class="p-6 border-b border-gray-800 flex justify-between items-center">
        <h1 class="text-2xl font-black italic uppercase">BROXY <span class="text-orange-500">VIDEOS</span></h1>
        <a href="index.html" class="text-orange-500 font-bold">Back to Home</a>
    </nav>
    <main class="max-w-7xl mx-auto p-6"><div id="video-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div></main>
    <script>
        const API_KEY = 'AIzaSyD-aZcMCuAFtnCKUd0wu7uv4Dp9UYtfkyc';
        const CHANNEL_ID = 'UCHuhBLFe1uxLgESiYpDfQgQ';
        async function loadArchive() {
            try {
                // type=video specifically excludes live archives
                const res = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=12&type=video`);
                const data = await res.json();
                let html = '';
                data.items.forEach(item => {
                    html += `<div class="bg-[#151921] rounded-2xl overflow-hidden border border-gray-800">
                        <iframe class="w-full aspect-video" src="https://www.youtube.com/embed/${item.id.videoId}" frameborder="0" allowfullscreen></iframe>
                        <div class="p-4"><p class="text-sm font-bold truncate">${item.snippet.title}</p></div>
                    </div>`;
                });
                document.getElementById('video-grid').innerHTML = html || '<p>No uploads found.</p>';
            } catch (e) { document.getElementById('video-grid').innerHTML = '<p class="text-red-500">Error loading videos.</p>'; }
        }
        loadArchive();
    </script>
</body>
</html>
