<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROXY | Video Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b0e14] text-white">
    <nav class="p-6 border-b border-gray-800 flex justify-between items-center">
        <h1 class="text-2xl font-black italic tracking-tighter">BROXY <span class="text-orange-500">ARCHIVE</span></h1>
        <a href="index.html" class="text-orange-500 font-bold">Back to Home</a>
    </nav>
    <main class="max-w-7xl mx-auto p-6">
        <div id="video-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <p class="col-span-3 text-center text-gray-500 animate-pulse">Fetching your latest uploads...</p>
        </div>
    </main>
    <script>
        const API_KEY = 'AIzaSyD-aZcMCuAFtnCKUd0wu7uv4Dp9UYtfkyc';
        const CHANNEL_ID = 'UCHuhBLFe1uxLgESiYpDfQgQ';
        async function loadArchive() {
            try {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=12&type=video`);
                const data = await res.json();
                let html = '';
                data.items.forEach(item => {
                    html += `<div class="bg-[#151921] rounded-2xl overflow-hidden border border-gray-800">
                        <iframe class="w-full aspect-video" src="https://www.youtube.com/embed/${item.id.videoId}" frameborder="0" allowfullscreen></iframe>
                        <div class="p-4"><p class="text-sm font-bold truncate">${item.snippet.title}</p></div>
                    </div>`;
                });
                document.getElementById('video-grid').innerHTML = html;
            } catch (e) { console.error(e); }
        }
        loadArchive();
    </script>
</body>
</html>
