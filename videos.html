<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROXY | Video Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0e14; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .broxy-logo { font-family: 'Rajdhani', sans-serif; letter-spacing: -1px; text-transform: uppercase; }
        .bento-card { background: #151921; border-radius: 20px; border: 1px solid #232a35; transition: 0.3s ease; }
        .bento-card:hover { transform: translateY(-3px); border-color: #ff8c00; }
    </style>
</head>
<body>
    <nav class="flex justify-between items-center p-6 border-b border-gray-800 bg-[#0b0e14]/95 backdrop-blur-xl sticky top-0 z-[100]">
        <div class="flex items-center gap-3">
            <img src="channels4_profile.jpg" alt="Broxy Logo" class="w-12 h-12 rounded-xl object-cover border border-gray-800">
            <h1 class="broxy-logo text-3xl font-black italic uppercase">BROXY<span class="text-orange-500">.</span></h1>
        </div>
        <a href="index.html" class="text-orange-500 font-bold hover:underline">Back to Home</a>
    </nav>
    <main class="max-w-7xl mx-auto p-6 space-y-12">
        <h2 class="text-3xl font-black italic uppercase tracking-wider underline decoration-orange-500">Video Archive</h2>
        <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="col-span-3 text-center text-gray-700 uppercase italic tracking-widest col-span-3">Loading video archive...</p>
        </div>
    </main>
    <footer class="p-8 text-center text-gray-700 text-sm mt-12 border-t border-gray-900">BROXY GAMING HUB Archive</footer>
    <script>
        const API_KEY = 'AIzaSyD-aZcMCuAFtnCKUd0wu7uv4Dp9UYtfkyc';
        const CHANNEL_ID = 'UCHuhBLFe1uxLgESiYpDfQgQ';
        async function getVideosGrid() {
            try {
                // The Fix: type=video filter only retrieves regular video uploads
                const response = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${YOUTUBE_API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=12&type=video`);
                const data = await response.json();
                if (data.items.length > 0) {
                    let gridHtml = '';
                    data.items.forEach(item => {
                        gridHtml += `
                            <div class="bento-card overflow-hidden !p-0 border-none group">
                                <a href="https://www.youtube.com/watch?v=${item.id.videoId}" target="_blank">
                                    <img src="${item.snippet.thumbnails.high.url}" class="w-full aspect-video group-hover:scale-105 transition-transform">
                                    <div class="p-4 bg-black/50 backdrop-blur-md">
                                        <h3 class="text-sm font-bold text-gray-200 line-clamp-2">${item.snippet.title}</h3>
                                    </div>
                                </a>
                            </div>`;
                    });
                    document.getElementById('video-grid').innerHTML = gridHtml;
                } else { document.getElementById('video-grid').innerHTML = '<div class="col-span-3 text-center text-gray-700 uppercase italic">No videos found.</div>'; }
            } catch (error) { document.getElementById('video-grid').innerHTML = '<div class="col-span-3 text-center text-red-500">API Error.</div>'; }
        }
        getVideosGrid();
    </script>
</body>
</html>
