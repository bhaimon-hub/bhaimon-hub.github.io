<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLBB Lucky Spin - Fixed</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-forest: #1a3c34;
      --cream: #fbfbf8;
      --gold: #c4a77d;
    }

    body {
      margin: 0; background: var(--cream);
      font-family: 'Montserrat', sans-serif;
      text-align: center; overflow: hidden;
    }

    h1 { margin-top: 40px; font-family: 'Playfair Display', serif; color: var(--deep-forest); }

    .wheel-wrapper {
      position: relative;
      width: 380px; height: 380px;
      margin: 40px auto;
    }

    /* THE POINTER */
    .pointer {
      position: absolute;
      top: -20px; left: 50%;
      transform: translateX(-50%);
      width: 40px; height: 50px;
      background: var(--deep-forest);
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      z-index: 100;
      filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
    }

    canvas {
      width: 100%; height: 100%;
      border-radius: 50%;
      border: 10px solid white;
      box-shadow: 0 15px 50px rgba(0,0,0,0.1);
      transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
    }

    button {
      margin-top: 20px; padding: 15px 40px;
      background: var(--deep-forest); color: white;
      border: none; border-radius: 30px;
      font-weight: 600; cursor: pointer; letter-spacing: 1px;
    }

    button:disabled { background: #999; }

    #result { margin-top: 20px; height: 80px; }
    .prize-text { font-size: 28px; font-weight: 600; color: var(--gold); }

    /* Sparkle Particle */
    .sparkle {
      position: absolute; pointer-events: none;
      background: radial-gradient(circle, #ffe0a3 0%, rgba(196,167,125,0) 70%);
      border-radius: 50%; z-index: 200;
    }
  </style>
</head>
<body>

<h1>MLBB LUCKY SPIN</h1>

<div class="wheel-wrapper">
  <div class="pointer"></div>
  <canvas id="wheel" width="500" height="500"></canvas>
</div>

<button id="spinBtn">SPIN NOW</button>
<div id="result"></div>

<audio id="spinSound"><source src="https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3" type="audio/mpeg"></audio>
<audio id="winSound"><source src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" type="audio/mpeg"></audio>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spinBtn");
const spinSound = document.getElementById("spinSound");
const winSound = document.getElementById("winSound");

const sections = ["Try Again", "50 Diamonds", "Basic Skin", "100 Diamonds", "Elite Skin", "Epic Skin", "Special Reward", "JACKPOT"];
const colors = ["#ffffff", "#f2f2f2", "#ffffff", "#f2f2f2", "#ffffff", "#f2f2f2", "#ffffff", "#f2f2f2"];

const total = sections.length;
const arc = (Math.PI * 2) / total;
let currentRotation = 0;

function drawWheel() {
  ctx.clearRect(0, 0, 500, 500);
  for (let i = 0; i < total; i++) {
    const angle = i * arc;
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(250, 250);
    ctx.arc(250, 250, 245, angle, angle + arc);
    ctx.fill();
    ctx.strokeStyle = "#ddd";
    ctx.stroke();

    ctx.save();
    ctx.translate(250, 250);
    ctx.rotate(angle + arc / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = "#333";
    ctx.font = "600 18px Montserrat";
    ctx.fillText(sections[i], 220, 10);
    ctx.restore();
  }
}

drawWheel();

spinBtn.onclick = () => {
  spinBtn.disabled = true;
  document.getElementById("result").innerHTML = "";
  
  // Audio: Start spin sound
  spinSound.currentTime = 0;
  spinSound.play();

  const winningIndex = Math.floor(Math.random() * total);
  
  /* CALCULATION FIX:
     1. Each slice is 360/8 = 45 degrees.
     2. Canvas draws 0 degrees at the 3 o'clock position.
     3. The pointer is at 12 o'clock (270 degrees).
     4. We calculate how many degrees to move the specific slice to the 270 deg mark.
  */
  const degreesPerSlice = 360 / total;
  const extraSpins = 1800; // 5 full laps
  const stopAt = 270 - (winningIndex * degreesPerSlice) - (degreesPerSlice / 2);
  
  currentRotation += extraSpins + (stopAt - (currentRotation % 360) + 360) % 360;
  
  canvas.style.transform = `rotate(${currentRotation}deg)`;

  setTimeout(() => {
    spinSound.pause();
    winSound.play();
    
    document.getElementById("result").innerHTML = `
      <div style="font-size:12px">YOU REWARDED:</div>
      <div class="prize-text">${sections[winningIndex]}</div>
    `;
    
    celebrate();
    spinBtn.disabled = false;
  }, 5000);
};

// PROFESSIONAL CELEBRATION: Gold Dust Burst
function celebrate() {
  for (let i = 0; i < 50; i++) {
    const sparkle = document.createElement("div");
    sparkle.className = "sparkle";
    
    const size = Math.random() * 15 + 5;
    sparkle.style.width = size + "px";
    sparkle.style.height = size + "px";
    
    document.body.appendChild(sparkle);
    
    const originX = window.innerWidth / 2;
    const originY = window.innerHeight / 2;
    
    const destX = (Math.random() - 0.5) * 800;
    const destY = (Math.random() - 0.5) * 800;

    sparkle.animate([
      { transform: `translate(${originX}px, ${originY}px) scale(0)`, opacity: 1 },
      { transform: `translate(${originX + destX}px, ${originY + destY}px) scale(1.5)`, opacity: 0 }
    ], {
      duration: 1500 + Math.random() * 1000,
      easing: 'out-expo'
    }).onfinish = () => sparkle.remove();
  }
}
</script>

</body>
</html>
