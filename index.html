<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aetherial MLBB Spin</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-forest: #1a3c34;
      --cream: #fbfbf8;
      --soft-white: #ffffff;
    }

    body {
      margin: 0;
      background-color: var(--cream);
      /* This is a placeholder that looks cool even if your image is missing */
      background-image: linear-gradient(rgba(251, 251, 248, 0.9), rgba(251, 251, 248, 0.9)), 
                        url('https://raw.githubusercontent.com/username/repository/main/1000117952.jpg'); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #333;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
    }

    h1 {
      margin-top: 40px;
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: var(--deep-forest);
    }

    .wheel-container {
      position: relative;
      width: 320px;
      margin: 30px auto;
    }

    /* Elegant Pointer */
    .pointer {
      width: 0; height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 30px solid var(--deep-forest);
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    canvas {
      width: 100%;
      border-radius: 50%;
      border: 8px solid var(--soft-white);
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      background: white; /* Ensures wheel is visible if script loads slowly */
    }

    button {
      margin-top: 20px;
      padding: 15px 45px;
      background: var(--deep-forest);
      color: white;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover { transform: scale(1.05); background: #26594d; }

    #result {
      margin-top: 25px;
      font-weight: 600;
      color: var(--deep-forest);
      min-height: 50px;
    }
  </style>
</head>
<body>

<h1>AETHERIAL SPIN</h1>
<p>Align your fortune with nature.</p>

<div class="wheel-container">
  <div class="pointer"></div>
  <canvas id="wheel" width="400" height="400"></canvas>
</div>

<button id="spinBtn">SPIN WHEEL</button>
<div id="result"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const sections = ["Try Again", "50 💎", "Epic Fragment", "100 💎", "Rare Skin", "Epic Skin", "Lucky Gem", "JACKPOT"];
const colors = ["#f4d3d3", "#d1e7dd", "#cfe2f3", "#fff3cd", "#e2e3e5", "#f8d7da", "#e0fbfc", "#ffefdb"];

const total = sections.length;
const arc = 2 * Math.PI / total;

function drawWheel() {
  ctx.clearRect(0,0,400,400);
  for (let i = 0; i < total; i++) {
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(200, 200);
    ctx.arc(200, 200, 200, i * arc, (i + 1) * arc);
    ctx.fill();

    ctx.save();
    ctx.translate(200, 200);
    ctx.rotate(i * arc + arc / 2);
    ctx.fillStyle = "#333";
    ctx.font = "bold 14px Montserrat";
    ctx.fillText(sections[i], 80, 5);
    ctx.restore();
  }
}

drawWheel(); // Initial draw

let spinning = false;
document.getElementById("spinBtn").onclick = function() {
  if (spinning) return;
  spinning = true;
  
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "Seeking your fortune...";

  let index = Math.floor(Math.random() * total);
  let anglePer = 360 / total;
  // Offset to make the pointer at the top (270 degrees) match the index
  let finalAngle = 270 - (index * anglePer + anglePer / 2);
  let spinAngle = 3600 + finalAngle;

  canvas.style.transition = "transform 4s cubic-bezier(0.15, 0, 0.15, 1)";
  canvas.style.transform = `rotate(${spinAngle}deg)`;

  setTimeout(() => {
    resultDiv.innerHTML = `✨ Result: ${sections[index]} ✨<br>Screenshot & DM to claim!`;
    spinning = false;
  }, 4000);
};
</script>
</body>
</html>
