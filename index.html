<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLBB Lucky Spin</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #0f172a, #020617);
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 15px;
      font-size: 22px;
    }

    .wheel-container {
      position: relative;
      width: 90vw;
      max-width: 320px;
      margin: 20px auto;
    }

    canvas {
      width: 100%;
      height: auto;
      border-radius: 50%;
      border: 5px solid white;
      transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
    }

    /* 🔺 PERFECT POINTER */
    .pointer {
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 25px solid red; /* 👈 pointing DOWN */
      position: absolute;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      filter: drop-shadow(0 0 5px red);
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      background: linear-gradient(45deg, gold, orange);
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin-top: 15px;
      font-size: 16px;
      padding: 0 10px;
    }
  </style>
</head>

<body>

<h1>🎡 MLBB Lucky Spin</h1>
<p>Spin & test your luck!</p>

<div class="wheel-container">
  <div class="pointer"></div>
  <canvas id="wheel" width="320" height="320"></canvas>
</div>

<button onclick="spin()">SPIN</button>

<div id="result"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const sections = [
  "Try Again",
  "50 💎",
  "Try Again",
  "100 💎",
  "Try Again",
  "Epic Skin",
  "Try Again",
  "JACKPOT"
];

const colors = [
  "#ff4d4d","#4dff88","#4da6ff","#ffd24d",
  "#ff66cc","#66ffff","#ffa64d","#b366ff"
];

const total = sections.length;
const arc = 2 * Math.PI / total;

function drawWheel() {
  for (let i = 0; i < total; i++) {
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(160,160);
    ctx.arc(160,160,160, i*arc, (i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(160,160);
    ctx.rotate(i*arc + arc/2);
    ctx.fillStyle = "#000";
    ctx.font = "bold 13px Arial";
    ctx.fillText(sections[i], 60, 5);
    ctx.restore();
  }
}

drawWheel();

let rotation = 0;
let spinning = false;

function spin() {
  if (spinning) return;
  spinning = true;

  const resultDiv = document.getElementById("result");

  let index = Math.floor(Math.random() * total);

  let anglePer = 360 / total;

  /* 🎯 ALWAYS CENTER LANDING */
  let finalAngle = 360 - (index * anglePer + anglePer / 2);

  /* 🎯 RESET ROTATION BUG FIX */
  rotation = rotation % 360;

  let spinAngle = 3600 + finalAngle;

  rotation += spinAngle;

  canvas.style.transform = `rotate(${rotation}deg)`;

  setTimeout(() => {
    resultDiv.innerHTML =
      "🎉 Result: " + sections[index] + "<br>📸 Screenshot & DM to claim!";
    spinning = false;
  }, 4000);
}
</script>

</body>
</html>
