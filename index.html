<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROXY | Official MLBB Gaming Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background-color: #0b0e14; color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .broxy-logo { font-family: 'Rajdhani', sans-serif; letter-spacing: -1px; text-transform: uppercase; }
        .bento-card { background: #151921; border-radius: 28px; padding: 24px; border: 1px solid #232a35; }
        #mobile-menu { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        #mobile-menu.open { transform: translateX(0); }
        .counter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    </style>
</head>
<body>
    <!-- NAV BAR -->
    <nav class="flex justify-between items-center p-4 md:p-6 border-b border-gray-800 sticky top-0 bg-[#0b0e14]/95 backdrop-blur-xl z-[100]">
        <div class="flex items-center gap-3">
            <img src="channels4_profile.jpg" class="w-10 h-10 md:w-12 md:h-12 rounded-xl border-2 border-orange-500 object-cover">
            <h1 class="broxy-logo text-2xl md:text-3xl font-black italic uppercase">BROXY<span class="text-orange-500">.</span></h1>
        </div>
        <div class="hidden md:flex gap-8 text-[11px] font-bold uppercase tracking-[0.2em] text-gray-400">
            <a href="index.html" class="hover:text-orange-500">Home</a>
            <a href="videos.html" class="hover:text-orange-500">Videos</a>
            <a href="live.html" class="hover:text-orange-500">Live</a>
            <a href="giveaway.html" class="hover:text-orange-500">Giveaway</a>
        </div>
        <button onclick="toggleMenu()" class="md:hidden text-2xl text-orange-500"><i class="fa-solid fa-ellipsis-vertical"></i></button>
    </nav>

    <!-- MOBILE MENU -->
    <div id="mobile-menu" class="fixed inset-0 bg-[#0b0e14] z-[150] flex flex-col p-8 space-y-8 md:hidden">
        <div class="flex justify-end"><button onclick="toggleMenu()" class="text-3xl text-orange-500"><i class="fa-solid fa-xmark"></i></button></div>
        <div class="flex flex-col space-y-6 text-xl font-black uppercase italic text-center">
            <a href="index.html" onclick="toggleMenu()">Home</a>
            <a href="videos.html" onclick="toggleMenu()">Videos</a>
            <a href="live.html" onclick="toggleMenu()">Live Now</a>
            <a href="giveaway.html" onclick="toggleMenu()">Weekly Giveaway</a>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-12">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Latest Video -->
            <div id="latest-video-container" class="lg:col-span-8 bento-card !p-0 overflow-hidden min-h-[350px] flex items-center justify-center">
                <p class="animate-pulse text-gray-700 uppercase tracking-widest">Detecting latest upload...</p>
            </div>
            <!-- GIVEN GIVEAWAY CARD -->
            <div class="lg:col-span-4 bento-card bg-gradient-to-br from-orange-600 to-red-600 border-none text-white flex flex-col justify-between items-center text-center">
                <img src="channels4_profile.jpg" class="w-20 h-20 md:w-24 md:h-24 rounded-full border-4 border-white shadow-2xl mb-4">
                <h3 class="text-xl md:text-2xl font-black uppercase italic">Weekly Skin Giveaway</h3>
                <button onclick="window.location.href='giveaway.html'" class="w-full bg-white text-orange-600 font-black py-3 rounded-2xl shadow-xl hover:scale-105 transition">ENTER NOW</button>
            </div>
        </div>

        <!-- HERO COUNTERS (Add your list items here) -->
        <section id="counter" class="space-y-6">
            <h3 class="text-xl font-black uppercase italic underline decoration-orange-500 underline-offset-8">Hero Counter Database</h3>
            <div class="counter-grid">
                <div class="p-4 bg-white/5 rounded-3xl border border-white/5 flex justify-between items-center hover:bg-orange-500/10 transition">
                    <span class="text-xs font-bold uppercase tracking-wider">🪨 Fredrinn</span>
                    <span class="text-right text-green-400 font-bold text-xs uppercase">Karrie, Dyrroth, X.Borg</span>
                </div>
                <!-- ... other heroes go here ... -->
            </div>
        </section>

        <!-- CHAT -->
        <section id="chat" class="bento-card flex flex-col h-[500px]">
            <h3 class="text-xl font-black italic uppercase tracking-widest mb-4">Community Lounge</h3>
            <div id="chat-messages" class="flex-1 overflow-y-auto space-y-4 pr-2 mb-4 text-sm"></div>
            <div class="flex gap-2 bg-[#0b0e14] p-2 rounded-2xl border border-white/10">
                <input type="text" id="chat-input" placeholder="Type here..." class="flex-1 bg-transparent px-3 py-2 outline-none text-gray-200">
                <button onclick="sendMessage()" class="bg-orange-500 text-black px-4 py-2 rounded-xl font-bold">SEND</button>
            </div>
        </section>
    </main>

    <script>
        function toggleMenu() { document.getElementById('mobile-menu').classList.toggle('open'); }
        const API_KEY = 'AIzaSyD-aZcMCuAFtnCKUd0wu7uv4Dp9UYtfkyc'; 
        const CHANNEL_ID = 'UCHuhBLFe1uxLgESiYpDfQgQ';

        async function loadLatest() {
            try {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=1&type=video`);
                const data = await res.json();
                if (data.items.length > 0) {
                    const id = data.items[0].id.videoId;
                    document.getElementById('latest-video-container').innerHTML = `<iframe class="w-full aspect-video" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>`;
                }
            } catch (e) { console.error(e); }
        }
        loadLatest();

        const firebaseConfig = { databaseURL: "https://YOUR-DATABASE.firebaseio.com/" }; // Replace with your URL
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (text) {
                database.ref('messages').push().set({ username: "Bro_" + Math.floor(Math.random() * 999), message: text, timestamp: Date.now() });
                input.value = "";
            }
        }
        database.ref('messages').limitToLast(30).on('child_added', (snapshot) => {
            const data = snapshot.val();
            document.getElementById('chat-messages').innerHTML += `<div class="bg-white/5 p-3 rounded-2xl border border-white/5"><span class="text-[10px] font-black text-orange-500 block uppercase italic">${data.username}</span><p class="text-gray-300">${data.message}</p></div>`;
            document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
        });
    </script>
</body>
</html>
