<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB Spin Pro</title>

<style>
body {
  background: radial-gradient(circle, #0f172a, #020617);
  color: white;
  text-align: center;
  font-family: Arial;
}

canvas {
  margin-top: 30px;
  border-radius: 50%;
}

button {
  margin-top: 20px;
  padding: 15px 40px;
  font-size: 18px;
  border: none;
  background: gold;
  color: black;
  cursor: pointer;
  border-radius: 10px;
}

#winner {
  font-size: 28px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🔥 MLBB LUCKY SPIN 🔥</h1>

<canvas id="wheel" width="400" height="400"></canvas>
<br>
<button id="spinBtn">SPIN</button>

<div id="winner"></div>

<!-- SOUND -->
<audio id="spinSound" loop>
  <source src="spin_loop.mp3" type="audio/mpeg">
</audio>

<audio id="winSound">
  <source src="win_fanfare.aac" type="audio/aac">
</audio>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const spinBtn = document.getElementById("spinBtn");
const spinSound = document.getElementById("spinSound");
const winSound = document.getElementById("winSound");

const sections = ["Try Again","50💎","100💎","Epic","Legend","Jackpot"];
const colors = ["red","blue","green","yellow","purple","orange"];

const arc = 2 * Math.PI / sections.length;

function drawWheel(){
  for(let i=0;i<sections.length;i++){
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(200,200);
    ctx.arc(200,200,200,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(200,200);
    ctx.rotate(i*arc + arc/2);
    ctx.fillStyle="white";
    ctx.fillText(sections[i],120,10);
    ctx.restore();
  }
}

drawWheel();

let spinning=false;

spinBtn.onclick = () => {
  if(spinning) return;
  spinning=true;

  // START SOUND
  spinSound.currentTime = 0;
  spinSound.volume = 1;
  spinSound.play();

  let winIndex = Math.floor(Math.random()*sections.length);

  let rotateDeg = 3600 + (360 - (winIndex * 360 / sections.length));

  canvas.style.transition = "5s";
  canvas.style.transform = `rotate(${rotateDeg}deg)`;

  setTimeout(()=>{

    // STOP SOUND SMOOTH
    let fade = setInterval(()=>{
      if(spinSound.volume > 0.05){
        spinSound.volume -= 0.05;
      } else {
        spinSound.pause();
        spinSound.currentTime = 0;
        spinSound.volume = 1;
        clearInterval(fade);
      }
    },100);

    // WIN SOUND
    winSound.play();

    document.getElementById("winner").innerHTML =
      "🎉 YOU WON: " + sections[winIndex];

    spinning=false;

  },5000);
};
</script>

</body>
</html>
