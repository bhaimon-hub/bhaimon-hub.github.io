<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB Lucky Spin</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1e3a8a, #020617);
  color: white;
  text-align: center;
  font-family: Arial;
  overflow-x: hidden;
}

/* 🔥 Animated background glow */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(0,255,255,0.1), transparent);
  animation: moveBg 8s linear infinite;
  z-index: -1;
}
@keyframes moveBg {
  0% { transform: translate(-25%, -25%); }
  50% { transform: translate(0%, 0%); }
  100% { transform: translate(-25%, -25%); }
}

h1 {
  margin-top: 15px;
  font-size: 24px;
  text-shadow: 0 0 15px cyan;
}

.wheel-container {
  position: relative;
  width: 90vw;
  max-width: 320px;
  margin: 20px auto;
}

/* 🎡 Wheel glow upgrade */
canvas {
  width: 100%;
  border-radius: 50%;
  border: 5px solid white;
  box-shadow:
    0 0 20px rgba(255,255,255,0.5),
    0 0 40px rgba(0,255,255,0.4);
}

/* 🔺 Pointer */
.pointer {
  width: 0;
  height: 0;
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-bottom: 25px solid red;
  position: absolute;
  top: -5px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  filter: drop-shadow(0 0 8px red);
}

/* 🔥 Button animation */
button {
  margin-top: 15px;
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  background: linear-gradient(45deg, gold, orange);
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 15px gold;
  transition: transform 0.1s;
}
button:active {
  transform: scale(0.95);
}

#result {
  margin-top: 15px;
  font-size: 18px;
}

/* 🎉 CONFETTI */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: -10px;
  animation: fall 2.5s linear forwards;
}
@keyframes fall {
  to {
    transform: translateY(100vh) rotate(720deg);
  }
}
</style>
</head>

<body>

<h1>🎡 MLBB Lucky Spin</h1>
<p>Spin & test your luck!</p>

<div class="wheel-container">
  <div class="pointer"></div>
  <canvas id="wheel" width="320" height="320"></canvas>
</div>

<button id="spinBtn">SPIN</button>

<div id="result"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const sections = [
  "Try Again","50 💎","Try Again","100 💎",
  "Try Again","Epic Skin","Try Again","JACKPOT"
];

const colors = [
  "#ff4d4d","#4dff88","#4da6ff","#ffd24d",
  "#ff66cc","#66ffff","#ffa64d","#b366ff"
];

const total = sections.length;
const arc = 2 * Math.PI / total;

/* DRAW WHEEL */
for (let i = 0; i < total; i++) {
  ctx.beginPath();
  ctx.fillStyle = colors[i];
  ctx.moveTo(160,160);
  ctx.arc(160,160,160, i*arc, (i+1)*arc);
  ctx.fill();

  ctx.save();
  ctx.translate(160,160);
  ctx.rotate(i*arc + arc/2);
  ctx.fillStyle = "#000";
  ctx.font = "bold 13px Arial";
  ctx.fillText(sections[i], 60, 5);
  ctx.restore();
}

/* 🔊 SOUNDS (optimized) */
const spinSound = new Audio("https://www.soundjay.com/misc/sounds/wheel-spin-1.mp3");
const winSound = new Audio("https://www.soundjay.com/human/sounds/applause-8.mp3");

let spinning = false;

document.getElementById("spinBtn").onclick = function () {
  if (spinning) return;
  spinning = true;

  spinSound.currentTime = 0;
  spinSound.play();

  const resultDiv = document.getElementById("result");

  let index = Math.floor(Math.random() * total);
  let anglePer = 360 / total;

  let finalAngle = 360 - (index * anglePer + anglePer / 2);
  let spinAngle = 3600 + finalAngle;

  canvas.style.transition = "none";
  canvas.style.transform = "rotate(0deg)";

  setTimeout(() => {
    canvas.style.transition = "transform 4s cubic-bezier(0.33,1,0.68,1)";
    canvas.style.transform = "rotate(" + spinAngle + "deg)";
  }, 50);

  setTimeout(() => {
    let reward = sections[index];
    resultDiv.innerHTML =
      "🎉 Result: " + reward + "<br>📸 Screenshot & DM!";

    /* 🎉 CELEBRATION */
    if (reward.includes("JACKPOT") || reward.includes("100")) {
      winSound.currentTime = 0;
      winSound.play();
      launchConfetti();
    }

    spinning = false;
  }, 4000);
};

/* 🎉 CONFETTI */
function launchConfetti() {
  for (let i = 0; i < 40; i++) {
    let div = document.createElement("div");
    div.classList.add("confetti");
    div.style.left = Math.random() * 100 + "vw";
    div.style.background = ["red","yellow","blue","green","cyan","pink"][Math.floor(Math.random()*6)];
    document.body.appendChild(div);

    setTimeout(() => div.remove(), 2500);
  }
}
</script>

</body>
</html>
