<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB Lucky Spin</title>

<style>
body {
  margin: 0;
  background: linear-gradient(270deg, #0f172a, #1e3a8a, #020617);
  background-size: 600% 600%;
  animation: bgMove 10s ease infinite;
  color: white;
  text-align: center;
  font-family: Arial;
  overflow-x: hidden;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

h1 {
  margin-top: 15px;
  text-shadow: 0 0 20px cyan;
}

.wheel-container {
  position: relative;
  width: 90vw;
  max-width: 320px;
  margin: 20px auto;
}

canvas {
  width: 100%;
  border-radius: 50%;
  border: 5px solid white;
  box-shadow: 0 0 30px cyan;
}

.pointer {
  width: 0;
  height: 0;
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-bottom: 25px solid red;
  position: absolute;
  top: -5px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  filter: drop-shadow(0 0 10px red);
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  background: linear-gradient(45deg, gold, orange);
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 20px gold;
}

#result {
  margin-top: 15px;
  font-size: 18px;
}

/* 🎉 PARTICLES */
.particle {
  position: fixed;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  animation: explode 1.2s ease-out forwards;
}

@keyframes explode {
  to {
    transform: translate(var(--x), var(--y)) scale(0);
    opacity: 0;
  }
}
</style>
</head>

<body>

<h1>🎡 MLBB Lucky Spin</h1>
<p>Spin & test your luck!</p>

<div class="wheel-container">
  <div class="pointer"></div>
  <canvas id="wheel" width="320" height="320"></canvas>
</div>

<button id="spinBtn">SPIN</button>

<div id="result"></div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const sections = [
  "Try Again","50 💎","Try Again","100 💎",
  "Try Again","Epic Skin","Try Again","JACKPOT"
];

const colors = [
  "#ff4d4d","#4dff88","#4da6ff","#ffd24d",
  "#ff66cc","#66ffff","#ffa64d","#b366ff"
];

const total = sections.length;
const arc = 2 * Math.PI / total;

/* DRAW */
for (let i = 0; i < total; i++) {
  ctx.beginPath();
  ctx.fillStyle = colors[i];
  ctx.moveTo(160,160);
  ctx.arc(160,160,160, i*arc, (i+1)*arc);
  ctx.fill();

  ctx.save();
  ctx.translate(160,160);
  ctx.rotate(i*arc + arc/2);
  ctx.fillStyle = "#000";
  ctx.font = "bold 13px Arial";
  ctx.fillText(sections[i], 60, 5);
  ctx.restore();
}

/* 🔊 BETTER SOUND SYSTEM */
const spinSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-game-wheel-spin-1539.mp3");
const winSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3");

let spinning = false;

document.getElementById("spinBtn").onclick = function () {
  if (spinning) return;
  spinning = true;

  spinSound.currentTime = 0;
  spinSound.play().catch(()=>{}); // fix browser block

  const resultDiv = document.getElementById("result");

  let index = Math.floor(Math.random() * total);
  let anglePer = 360 / total;

  let finalAngle = 360 - (index * anglePer + anglePer / 2);
  let spinAngle = 3600 + finalAngle;

  canvas.style.transition = "none";
  canvas.style.transform = "rotate(0deg)";

  setTimeout(() => {
    canvas.style.transition = "transform 4s cubic-bezier(0.33,1,0.68,1)";
    canvas.style.transform = "rotate(" + spinAngle + "deg)";
  }, 50);

  setTimeout(() => {
    let reward = sections[index];

    resultDiv.innerHTML =
      "🎉 Result: " + reward + "<br>📸 Screenshot & DM!";

    /* 🎉 EVERY WIN CELEBRATION */
    if (!reward.includes("Try Again")) {
      winSound.currentTime = 0;
      winSound.play().catch(()=>{});
      explosion();
    }

    spinning = false;
  }, 4000);
};

/* 💥 EXPLOSION EFFECT */
function explosion() {
  for (let i = 0; i < 60; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.background = ["red","yellow","cyan","lime","pink"][Math.floor(Math.random()*5)];

    let x = (Math.random() - 0.5) * 300 + "px";
    let y = (Math.random() - 0.5) * 300 + "px";

    p.style.setProperty("--x", x);
    p.style.setProperty("--y", y);

    p.style.left = "50%";
    p.style.top = "50%";

    document.body.appendChild(p);

    setTimeout(() => p.remove(), 1200);
  }
}
</script>

</body>
</html>
