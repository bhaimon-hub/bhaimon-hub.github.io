<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROXY | Official MLBB Gaming Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <!-- YT Data API logic is now bundled with your file -->

    <style>
        body { background-color: #0b0e14; color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .broxy-logo { font-family: 'Rajdhani', sans-serif; letter-spacing: -1px; text-transform: uppercase; }
        .bento-card { background: #151921; border-radius: 28px; padding: 24px; transition: 0.3s ease; border: 1px solid #232a35; }
        .bento-card:hover { transform: translateY(-8px); border-color: #ff8c00; box-shadow: 0 15px 40px rgba(255, 140, 0, 0.15); }
        
        /* Mobile Menu Transitions */
        #mobile-menu { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        #mobile-menu.open { transform: translateX(0); }

        .counter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    </style>
</head>
<body>

    <!-- NAV BAR -->
    <nav class="flex justify-between items-center p-4 md:p-6 border-b border-gray-800 sticky top-0 bg-[#0b0e14]/95 backdrop-blur-xl z-[100]">
        <div class="flex items-center gap-3">
            <img src="channels4_profile.jpg" alt="Broxy Logo" class="w-10 h-10 md:w-12 md:h-12 rounded-xl border-2 border-orange-500 object-cover">
            <h1 class="broxy-logo text-2xl md:text-3xl font-black italic uppercase">BROXY<span class="text-orange-500">.</span></h1>
        </div>
        
        <!-- Desktop Menu -->
        <div class="hidden md:flex gap-8 text-[11px] font-bold uppercase tracking-[0.2em] text-gray-400">
            <a href="#home" class="hover:text-orange-500 transition">Home</a>
            <a href="videos.html" class="hover:text-orange-500 transition">Videos</a>
            <a href="live.html" class="hover:text-orange-500 transition">Live</a>
            <a href="#counter" class="hover:text-orange-500 transition">Guides</a>
        </div>

        <div class="flex items-center gap-4">
            <a href="https://www.youtube.com/channel/UCHuhBLFe1uxLgESiYpDfQgQ?sub_confirmation=1" target="_blank" class="hidden sm:block bg-orange-500 text-black px-7 py-3 rounded-2xl font-black text-xs hover:scale-105 transition uppercase tracking-wider">SUBSCRIBE</a>
            <!-- Mobile Menu Toggle -->
            <button onclick="toggleMenu()" class="md:hidden text-2xl text-orange-500 focus:outline-none"><i class="fa-solid fa-ellipsis-vertical"></i></button>
        </div>
    </nav>

    <!-- Mobile Side Menu -->
    <div id="mobile-menu" class="fixed inset-0 bg-[#0b0e14] z-[150] flex flex-col p-8 space-y-8 md:hidden">
        <div class="flex justify-end"><button onclick="toggleMenu()" class="text-3xl text-orange-500"><i class="fa-solid fa-xmark"></i></button></div>
        <div class="flex flex-col space-y-6 text-xl font-black uppercase italic tracking-widest text-center">
            <a href="#home" onclick="toggleMenu()" class="hover:text-orange-500">Home</a>
            <a href="videos.html" onclick="toggleMenu()" class="hover:text-orange-500">All Videos</a>
            <a href="live.html" onclick="toggleMenu()" class="hover:text-orange-500">Live Now</a>
            <a href="#counter" onclick="toggleMenu()" class="hover:text-orange-500">Guides</a>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-12" id="home">
        
        <!-- BENTO HERO WITH AUTO-DETECTED LATEST VIDEO -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div id="latest-video-container" class="lg:col-span-8 bento-card !p-0 overflow-hidden relative border-none">
                <!-- VIDEO WILL APPEAR HERE AUTOMATICALLY VIA JAVASCRIPT -->
                <div class="p-20 text-center text-gray-700 uppercase italic tracking-widest">Loading latest video...</div>
            </div>
            <div class="lg:col-span-4 bento-card bg-gradient-to-br from-orange-600 to-red-600 border-none text-white flex flex-col justify-between items-center text-center">
                <img src="channels4_profile.jpg" class="w-20 h-20 md:w-24 md:h-24 rounded-full border-4 border-white shadow-2xl mb-4">
                <h3 class="text-xl md:text-2xl font-black uppercase italic">Monthly Skin Giveaway</h3>
                <p class="text-xs opacity-90 mb-4">Diamonds & Starlight skins.</p>
                <button onclick="window.location.href='live.html'" class="w-full bg-white text-orange-600 font-black py-3 rounded-2xl">ENTER GIVEAWAY</button>
            </div>
        </div>

        <!-- HERO COUNTER DATABASE -->
        <section id="counter" class="space-y-6">
            <h3 class="text-xl font-black tracking-tight uppercase italic text-center md:text-left underline decoration-orange-500 underline-offset-8">Hero Counter Database</h3>
            <div class="counter-grid">
                <!-- Data from user list -->
                <div class="p-4 bg-white/5 rounded-3xl border border-white/5 flex justify-between items-center hover:bg-orange-500/10 transition">
                    <span class="text-xs font-bold uppercase tracking-wider">Fredrinn</span>
                    <span class="text-right text-green-400 font-bold text-xs uppercase">Karrie, Dyrroth, X.Borg</span>
                </div>
                <!-- ... other counters remain the same ... -->
            </div>
        </section>

    </main>

    <footer class="p-8 md:p-16 text-center border-t border-gray-900 mt-12 bg-[#080a0f]">
        <h2 class="broxy-logo text-xl md:text-2xl font-black mb-4 uppercase italic">BROXY<span class="text-orange-500">.</span></h2>
        <p class="text-[10px] font-black tracking-[0.5em] text-gray-700 uppercase">© 2026 BROXY GAMING HUB</p>
    </footer>

    <script>
        function toggleMenu() { document.getElementById('mobile-menu').classList.toggle('open'); }

        // --- THE FIX: YOUTUBE API DATA DETECTOR ---
        // REPLACE 'YOUR_API_KEY_HERE' WITH A VALID KEY
        const YOUTUBE_API_KEY = 'YOUR_API_KEY_HERE';
        const CHANNEL_ID = 'UCHuhBLFe1uxLgESiYpDfQgQ'; // Your unique ID
        
        async function getLatestVideo() {
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${YOUTUBE_API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=1&type=video`);
                const data = await response.json();
                
                if (data.items.length > 0) {
                    const latestVideoId = data.items[0].id.videoId;
                    const latestVideoTitle = data.items[0].snippet.title;
                    
                    document.getElementById('latest-video-container').innerHTML = `
                        <iframe class="w-full aspect-video" src="https://www.youtube.com/embed/${latestVideoId}" frameborder="0" allowfullscreen></iframe>
                        <div class="absolute bottom-4 left-4 bg-black/50 backdrop-blur-md p-3 rounded-xl border border-white/10">
                            <span class="text-[10px] font-black text-orange-500 uppercase tracking-widest">Most Recent Upload</span>
                            <h3 class="text-sm font-bold">${latestVideoTitle}</h3>
                        </div>
                    `;
                } else {
                    document.getElementById('latest-video-container').innerHTML = '<div class="p-20 text-center">No videos found.</div>';
                }
            } catch (error) {
                console.error('YouTube API Error:', error);
                document.getElementById('latest-video-container').innerHTML = '<div class="p-20 text-center text-red-500">Error loading video. Check API Key.</div>';
            }
        }

        // Run the detector on load
        getLatestVideo();
    </script>
</body>
</html>
