<!DOCTYPE html>
<html>
<head>
  <title>MLBB Lucky Spin</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 20px;
    }

    .wheel-container {
      position: relative;
      width: 300px;
      margin: 40px auto;
    }

    #wheel {
      width: 100%;
      transition: transform 4s ease-out;
    }

    #spinBtn {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      background: gold;
      color: black;
      border-radius: 5px;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<h1>🎡 MLBB Lucky Spin</h1>
<p>Spin and win rewards!</p>

<div class="wheel-container">
  <img id="wheel" src="https://i.imgur.com/6o5V7bG.png">
</div>

<button id="spinBtn" onclick="spin()">SPIN</button>

<div id="result"></div>

<script>
let spinning = false;

function spin() {
  if (spinning) return;
  spinning = true;

  let wheel = document.getElementById("wheel");
  let result = document.getElementById("result");

  let rand = Math.random();
  let deg = 3600 + Math.floor(Math.random() * 360);

  wheel.style.transform = "rotate(" + deg + "deg)";

  setTimeout(() => {
    if (rand < 0.7) {
      result.innerHTML = "❌ Try Again";
    } else if (rand < 0.95) {
      result.innerHTML = "⭐ Small Reward! Screenshot & DM";
    } else {
      result.innerHTML = "💎 JACKPOT! Screenshot & DM NOW!";
    }
    spinning = false;
  }, 4000);
}
</script>

</body>
</html>
