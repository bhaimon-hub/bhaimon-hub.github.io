<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aetherial MLBB Spin</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --deep-forest: #1a3c34;
      --cream: #fbfbf8;
      --soft-white: #ffffff;
      --gold-accent: #c4a77d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      margin: 0;
      background-color: var(--cream);
      background-image: linear-gradient(rgba(251, 251, 248, 0.95), rgba(251, 251, 248, 0.95)), 
                        url('1000117952.jpg'); 
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #333;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
      padding: 0 20px 40px;
    }

    h1 {
      margin-top: 50px;
      margin-bottom: 10px;
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 36px;
      color: var(--deep-forest);
      letter-spacing: -1px;
    }

    p {
      font-size: 16px;
      color: #666;
      margin-bottom: 40px;
      max-width: 450px;
      margin-left: auto;
      margin-right: auto;
    }

    .wheel-main-container {
      position: relative;
      width: 90vw;
      max-width: 380px;
      margin: 0 auto;
    }

    .pointer {
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 30px solid var(--deep-forest);
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));
    }

    canvas {
      width: 100%;
      height: auto;
      border-radius: 50%;
      border: 8px solid var(--soft-white);
      position: relative;
      z-index: 1;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      transform: rotate(0deg); 
    }

    button {
      margin-top: 30px;
      padding: 18px 50px;
      font-size: 14px;
      font-family: 'Montserrat', sans-serif;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: none;
      background-color: var(--deep-forest);
      color: var(--soft-white);
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    button:hover {
      background-color: #26594d;
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
      transform: scale(1);
    }

    #result {
      margin-top: 30px;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .winner-announcement {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: var(--deep-forest);
      animation: popIn 0.5s ease;
    }

    .winner-prize {
      color: var(--gold-accent);
      font-weight: 600;
      font-size: 32px;
      margin-top: 5px;
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      opacity: 0.8;
      border-radius: 2px;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>

<body>

    <h1>AETHERIAL SPIN</h1>
    <p>Align your fortune with nature’s rhythm. Spin and claim your rare rewards.</p>

    <div class="wheel-main-container">
      <div class="pointer" title="Aligned Fortune Pointer"></div>
      <canvas id="wheel" width="400" height="400"></canvas>
    </div>

    <button id="spinBtn">Test Your Luck</button>

    <div id="result"></div>

    <audio id="spinSound" loop>
      <source src="spin_loop.mp3" type="audio/mpeg">
    </audio>
    
    <audio id="winSound">
      <source src="win_fanfare.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const resultDiv = document.getElementById("result");
        const spinSound = document.getElementById("spinSound");
        const winSound = document.getElementById("winSound");

        const size = 400;
        const centerX = size / 2;
        const centerY = size / 2;
        const radius = size / 2;

        const sections = ["Try Again", "50 💎", "Trail", "100 💎", "Bloom", "Epic Skin", "Grove", "JACKPOT"];
        const colors = ["#f4d3d3", "#d1e7dd", "#cfe2f3", "#fff3cd", "#e2e3e5", "#f8d7da", "#e0fbfc", "#ffefdb"];

        const total = sections.length;
        const arc = 2 * Math.PI / total;

        function drawWheel() {
          ctx.clearRect(0,0,size,size);

          for (let i = 0; i < total; i++) {
            ctx.beginPath();
            ctx.fillStyle = colors[i];
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, i * arc, (i + 1) * arc);
            ctx.fill();

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(i * arc + arc / 2);
            ctx.fillStyle = "#333"; 
            ctx.font = "600 16px Montserrat, sans-serif";
            ctx.fillText(sections[i], radius * 0.60, 7); 
            ctx.restore();
          }
        }

        drawWheel(); 

        let spinning = false;

        spinBtn.onclick = function () {
          if (spinning) return;
          spinning = true;

          resultDiv.innerHTML = "";
          spinBtn.innerHTML = "Seeking...";
          spinBtn.disabled = true;
          
          // --- Start Ticking Sound ---
          spinSound.play().catch(e => console.log("Audio play blocked by browser. Click page."));

          const winningIndex = Math.floor(Math.random() * total);

          // Fixed Spin Logic
          const segmentAngleDeg = 360 / total; 
          const baseAlignment = 270; 
          const winnerOffset = (winningIndex * segmentAngleDeg) + (segmentAngleDeg / 2);
          const targetFinalAngle = baseAlignment - winnerOffset;
          const totalRotationDeg = 3600 + targetFinalAngle;

          canvas.style.transition = "none";
          canvas.style.transform = "rotate(0deg)";

          setTimeout(() => {
            canvas.style.transition = "transform 5s cubic-bezier(0.15, 0.8, 0.2, 1)";
            canvas.style.transform = `rotate(${totalRotationDeg}deg)`;
          }, 50);

          setTimeout(() => {
            spinning = false;
            spinBtn.disabled = false;
            spinBtn.innerHTML = "Spin Again";
            
            // --- Stop Ticking Sound ---
            spinSound.pause(); 
            spinSound.currentTime = 0; 

            // --- Play Win Sound ---
            winSound.play().catch(e => console.log("Audio play blocked.")); 
            
            celebrateWin(sections[winningIndex]);

          }, 5000); 
        };

        function celebrateWin(prize) {
          resultDiv.innerHTML = `
            <div class="winner-announcement">The Aether Has Chosen:</div>
            <div class="winner-prize">${prize}</div>
            <div style="font-size:14px; color:#666; margin-top:5px;">Screenshot & DM to claim!</div>
          `;
          createConfettiBurst();
          createConfettiBurst();
        }

        function createConfettiBurst() {
          const confettiCount = 50;
          const container = document.body;
          
          for (let i = 0; i < confettiCount; i++) {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.left = (Math.random() * 100) + 'vw';
            confetti.style.top = (Math.random() * -50) + 'px';
            confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
            container.appendChild(confetti);
            const duration = (Math.random() * 3) + 2;
            confetti.animate([
              { top: confetti.style.top, opacity: 1 },
              { top: '100vh', opacity: 0 }
            ], {
              duration: duration * 1000,
              easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
              fill: 'forwards'
            });
            setTimeout(() => confetti.remove(), duration * 1000);
          }
        }
    </script>
</body>
</html>
