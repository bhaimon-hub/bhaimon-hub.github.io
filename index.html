<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB Lucky Spin</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
:root {
  --deep-forest: #1a3c34;
  --cream: #fbfbf8;
  --soft-white: #ffffff;
  --gold-accent: #c4a77d;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background-color: var(--cream);
  background-image: linear-gradient(rgba(251, 251, 248, 0.95), rgba(251, 251, 248, 0.95)),
                    url('1000117952.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  text-align: center;
  font-family: 'Montserrat', sans-serif;
  padding: 0 20px 40px;
  overflow-x: hidden;
}

h1 {
  margin-top: 40px;
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  color: var(--deep-forest);
}

p {
  margin-bottom: 30px;
  color: #555;
}

.wheel-main-container {
  position: relative;
  width: 90vw;
  max-width: 380px;
  margin: auto;
}

.pointer {
  width: 0;
  height: 0;
  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-top: 30px solid var(--deep-forest);
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

canvas {
  width: 100%;
  border-radius: 50%;
  border: 8px solid white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

button {
  margin-top: 25px;
  padding: 16px 45px;
  border: none;
  background: var(--deep-forest);
  color: white;
  border-radius: 40px;
  cursor: pointer;
  font-weight: 600;
}

button:disabled {
  background: #ccc;
}

#result {
  margin-top: 25px;
  height: 100px;
}

.winner-announcement {
  font-size: 22px;
  color: var(--deep-forest);
}

.winner-prize {
  font-size: 30px;
  color: var(--gold-accent);
}

/* FIXED CONFETTI */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  opacity: 0.8;
  pointer-events: none;
}
</style>
</head>

<body>

<h1>LUCKY SPIN EVENT</h1>
<p>Spin the wheel and win exclusive rewards!</p>

<div class="wheel-main-container">
  <div class="pointer"></div>
  <canvas id="wheel" width="400" height="400"></canvas>
</div>

<button id="spinBtn">SPIN NOW</button>

<div id="result"></div>

<!-- SOUND -->
<audio id="spinSound" loop>
  <source src="spin_loop.mp3" type="audio/mpeg">
</audio>

<audio id="winSound">
  <source src="win_fanfare.aac" type="audio/aac">
</audio>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spinBtn");
const resultDiv = document.getElementById("result");
const spinSound = document.getElementById("spinSound");
const winSound = document.getElementById("winSound");

const size = 400;
const center = size/2;
const radius = size/2;

const sections = [
  "Try Again",
  "50 Diamonds",
  "Basic Skin",
  "100 Diamonds",
  "Elite Skin",
  "Epic Skin",
  "Recall Effect",
  "JACKPOT"
];

const colors = ["#ffd6d6","#d6f5d6","#d6e0ff","#fff0b3","#e6ccff","#ffcccc","#ccf2ff","#ffe6cc"];

const total = sections.length;
const arc = 2 * Math.PI / total;

function drawWheel(){
  for(let i=0;i<total;i++){
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(center,center);
    ctx.arc(center,center,radius,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(center,center);
    ctx.rotate(i*arc + arc/2);
    ctx.fillStyle="#333";
    ctx.fillText(sections[i],radius*0.6,5);
    ctx.restore();
  }
}
drawWheel();

let spinning=false;

spinBtn.onclick = () => {
  if(spinning) return;
  spinning=true;

  spinBtn.disabled=true;
  resultDiv.innerHTML="";

  spinSound.play();

  const winIndex = Math.floor(Math.random()*total);

  const segment = 360/total;
  const finalDeg = 3600 + (270 - (winIndex*segment + segment/2));

  canvas.style.transition="transform 5s ease-out";
  canvas.style.transform=`rotate(${finalDeg}deg)`;

  setTimeout(()=>{
    spinSound.pause();
    spinSound.currentTime=0;

    winSound.play();

    resultDiv.innerHTML = `
      <div class="winner-announcement">You Won:</div>
      <div class="winner-prize">${sections[winIndex]}</div>
    `;

    confetti();

    spinBtn.disabled=false;
    spinning=false;

  },5000);
};

function confetti(){
  for(let i=0;i<80;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.left=Math.random()*100+"vw";
    c.style.top="-10px";
    document.body.appendChild(c);

    c.animate([
      {transform:"translateY(0)"},
      {transform:"translateY(100vh)"}
    ],{
      duration:2000+Math.random()*2000
    });

    setTimeout(()=>c.remove(),3000);
  }
}
</script>

</body>
</html>
