<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROXY | Official Live Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0e14; color: white; font-family: 'Inter', sans-serif; }
        .broxy-logo { font-family: 'Rajdhani', sans-serif; letter-spacing: -1px; text-transform: uppercase; }
        .live-frame { aspect-ratio: 16/9; }
    </style>
</head>
<body>
    <nav class="flex justify-between items-center p-6 border-b border-gray-800 bg-[#0b0e14]/95 backdrop-blur-xl sticky top-0 z-[100]">
        <div class="flex items-center gap-3">
            <img src="channels4_profile.jpg" alt="Broxy Logo" class="w-12 h-12 rounded-xl object-cover border-2 border-red-500 shadow-[0_0_15px_rgba(255,0,0,0.3)]">
            <h1 class="broxy-logo text-3xl font-black italic uppercase tracking-tighter text-red-500">BROXY <span class="text-white">LIVE</span></h1>
        </div>
        <a href="index.html" class="text-red-500 font-bold hover:underline">Back to Home</a>
    </nav>
    <main class="max-w-7xl mx-auto p-6 space-y-12">
        <h2 class="text-3xl font-black italic uppercase tracking-wider underline decoration-red-500">Live Hub Archive</h2>
        <div id="live-container" class="bg-[#151921] p-8 rounded-3xl border border-gray-800 flex flex-col items-center">
            <div class="text-center text-gray-700 uppercase italic tracking-widest">Loading Live Archive...</div>
        </div>
    </main>
    <footer class="p-8 text-center text-gray-700 text-sm mt-12 border-t border-gray-900">BROXY LIVE Hub</footer>
    <script>
        const API_KEY = 'AIzaSyD-aZcMCuAFtnCKUd0wu7uv4Dp9UYtfkyc';
        const CHANNEL_ID = 'UCHuhBLFe1uxLgESiYpDfQgQ';
        async function checkLiveStatus() {
            try {
                // Filter: type=video retrieves all video content
                // eventType=live filter specifically looks for broadcasts that are completed or ongoing.
                const response = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&type=video&eventType=live&maxResults=6`);
                const data = await response.json();
                const container = document.getElementById('live-container');
                if (data.items.length > 0) {
                    let gridHtml = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full">';
                    data.items.forEach(item => {
                        gridHtml += `
                            <div class="bg-[#151921] rounded-2xl overflow-hidden border border-gray-800">
                                <iframe class="w-full aspect-video" src="https://www.youtube.com/embed/${item.id.videoId}" frameborder="0" allowfullscreen></iframe>
                                <div class="p-4">
                                    <p class="text-sm font-bold text-gray-200 line-clamp-2">${item.snippet.title}</p>
                                </div>
                            </div>`;
                    });
                    gridHtml += '</div>';
                    container.innerHTML = gridHtml;
                } else {
                    container.innerHTML = `
                        <div class="text-center">
                            <i class="fa-solid fa-moon text-7xl text-gray-800 mb-6 animate-pulse"></i>
                            <h3 class="text-xl font-bold text-gray-500 uppercase italic">Offline</h3>
                            <p class="text-sm text-gray-700 mt-2">Broxy is not currently streaming. Subscribe for notifications!</p>
                        </div>`;
                }
            } catch (error) { container.innerHTML = '<div class="text-red-500">API Error.</div>'; }
        }
        checkLiveStatus();
    </script>
</body>
</html>
